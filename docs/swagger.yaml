basePath: /
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: Vigo
    url: http://www.swagger.io/support
  description: 基于 Go 语言开发的极简、优雅的企业级 SaaS 框架 API 文档
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Vigo API
  version: "3.0"
paths:
  /:
    get:
      consumes:
      - application/json
      description: 获取框架基础信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 框架首页
      tags:
      - 基础
  /api/login:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: 验证用户名和密码并返回Token
      parameters:
      - description: 用户名
        in: formData
        name: username
        required: true
        type: string
      - description: 密码
        in: formData
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: 用户登录
      tags:
      - 认证
  /hello:
    get:
      consumes:
      - application/json
      description: 根据输入的名字返回问候语
      parameters:
      - description: 用户名
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 打招呼接口
      tags:
      - 基础
swagger: "2.0"
