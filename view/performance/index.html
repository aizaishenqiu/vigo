<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 系统性能测试中心 - Vigo</title>
    <script src="/static/js/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 深色主题 */
        :root { 
            --bg-color:#020617; 
            --card-bg:#111827; 
            --text-primary:#f9fafb; 
            --text-secondary:#9ca3af; 
            --accent-color:#3b82f6; 
            --success-color:#10b981; 
            --danger-color:#ef4444; 
            --warning-color:#f59e0b; 
            --border-color:#374151; 
            --input-bg:#1f2937; 
            --input-border:#4b5563; 
            --panel-bg:rgba(59, 130, 246, 0.1);
        }
        
        /* 浅色主题 */
        [data-theme="light"] {
            --bg-color:#f8fafc; 
            --card-bg:#ffffff; 
            --text-primary:#1e293b; 
            --text-secondary:#64748b; 
            --accent-color:#3b82f6; 
            --success-color:#10b981; 
            --danger-color:#ef4444; 
            --warning-color:#f59e0b; 
            --border-color:#e2e8f0; 
            --input-bg:#f1f5f9; 
            --input-border:#cbd5e1; 
            --panel-bg:rgba(59, 130, 246, 0.1);
        }

        .dashboard-screen {
            background: var(--bg-color);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px 30px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header-title h1 {
            font-size: 2rem;
            margin: 0;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 5px;
            letter-spacing: 3px;
        }

        .header-time {
            font-size: 1.5rem;
            color: #00d4ff;
            font-weight: bold;
        }

        .dashboard-main {
            display: grid;
            grid-template-columns: 340px 1fr 380px;
            gap: 20px;
            height: calc(100vh - 150px);
        }

        .panel-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .panel-icon {
            font-size: 1.3rem;
        }

        .panel-title h3 {
            margin: 0;
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .left-panel, .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .system-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 10px;
        }

        .stat-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .config-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .config-item label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .config-item input, .config-item select {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 6px;
            padding: 10px;
            color: var(--text-primary);
            font-family: inherit;
        }

        .config-item input:focus, .config-item select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            filter: brightness(110%);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .test-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .test-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .test-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--accent-color);
        }

        .driver-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .driver-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .driver-card:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .driver-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .driver-name {
            color: var(--accent-color);
            font-weight: bold;
        }

        .center-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-chart-card {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #mainChart {
            flex: 1;
            min-height: 400px;
        }

        .loading-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--accent-color);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            z-index: 1000;
        }

        .loading-panel.active {
            display: block;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(59, 130, 246, 0.2);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 300px;
            height: 8px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), var(--success-color));
            width: 0%;
            transition: width 0.3s;
        }

        .results-container {
            max-height: 600px;
            overflow-y: auto;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state .hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .result-item {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .result-item h4 {
            color: var(--success-color);
            margin: 0 0 10px 0;
            font-size: 0.95rem;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 0.85rem;
        }

        .result-row .label {
            color: var(--text-secondary);
        }

        .result-row .value.success {
            color: var(--success-color);
            font-weight: bold;
        }

        .result-row .value.warning {
            color: var(--warning-color);
        }

        .result-row .value.danger {
            color: var(--danger-color);
        }

        .results-container::-webkit-scrollbar {
            width: 5px;
        }

        .results-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .results-container::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 3px;
        }
    </style>
</head>
<body>
<div class="dashboard-screen">
    <div class="dashboard-header">
        <div class="header-title">
            <h1>⚡ 系统性能测试中心</h1>
            <p class="subtitle">SYSTEM PERFORMANCE TESTING DASHBOARD</p>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="/" style="background: var(--accent-color); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 500;">返回首页</a>
            <div class="header-time" id="currentTime">-</div>
        </div>
    </div>

    <div class="dashboard-main">
        <div class="left-panel">
            <div class="panel-card">
                <div class="panel-title">
                    <span class="panel-icon">🖥️</span>
                    <h3>系统状态监控</h3>
                </div>
                <div class="system-grid">
                    <div class="stat-box">
                        <div class="stat-label">CPU 核心数</div>
                        <div class="stat-value" id="cpuCores">-</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Goroutines</div>
                        <div class="stat-value" id="goroutines">-</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">内存使用</div>
                        <div class="stat-value" id="memoryAlloc">-</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Go 版本</div>
                        <div class="stat-value" id="goVersion">-</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">GC 次数</div>
                        <div class="stat-value" id="gcCycles">-</div>
                    </div>
                </div>
            </div>

            <div class="panel-card">
                <div class="panel-title">
                    <span class="panel-icon">🔧</span>
                    <h3>测试配置</h3>
                </div>
                <div class="config-group">
                    <div class="config-item">
                        <label>并发数</label>
                        <input type="number" id="concurrency" value="10" min="1" max="1000">
                    </div>
                    <div class="config-item">
                        <label>迭代次数</label>
                        <input type="number" id="iterations" value="1000" min="100" max="100000">
                    </div>
                    <div class="config-item">
                        <label>持续时间</label>
                        <input type="text" id="duration" value="10s">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="runAllBtn">🚀 运行全部</button>
                    <button class="btn btn-danger" id="clearBtn">🗑️ 清除</button>
                </div>
            </div>

            <div class="panel-card">
                <div class="panel-title">
                    <span class="panel-icon">🎯</span>
                    <h3>单项测试</h3>
                </div>
                <div class="test-buttons">
                    <button class="test-btn" id="dbReadBtn">📊 数据库读取</button>
                    <button class="test-btn" id="dbWriteBtn">📝 数据库写入</button>
                    <button class="test-btn" id="redisBtn">⚡ Redis</button>
                    <button class="test-btn" id="queueBtn">📬 队列</button>
                    <button class="test-btn" id="qpsBtn">📈 QPS</button>
                    <button class="test-btn" id="memoryBtn">💾 内存</button>
                </div>
            </div>

            <div class="panel-card">
                <div class="panel-title">
                    <span class="panel-icon">🗄️</span>
                    <h3>数据库驱动测试</h3>
                </div>
                <div class="driver-grid">
                    <div class="driver-card" id="mysqlBtn">
                        <div class="driver-icon">🐬</div>
                        <div class="driver-name">MySQL</div>
                    </div>
                    <div class="driver-card" id="postgresBtn">
                        <div class="driver-icon">🐘</div>
                        <div class="driver-name">PostgreSQL</div>
                    </div>
                    <div class="driver-card" id="sqliteBtn">
                        <div class="driver-icon">📦</div>
                        <div class="driver-name">SQLite</div>
                    </div>
                    <div class="driver-card" id="mssqlBtn">
                        <div class="driver-icon">🏢</div>
                        <div class="driver-name">SQL Server</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="center-panel">
            <div class="panel-card main-chart-card">
                <div class="panel-title">
                    <span class="panel-icon">📊</span>
                    <h3>性能对比图表</h3>
                </div>
                <div id="mainChart"></div>
            </div>

            <div class="loading-panel" id="loading">
                <div class="spinner"></div>
                <p>正在执行测试...</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="panel-card">
                <div class="panel-title">
                    <span class="panel-icon">📋</span>
                    <h3>测试结果</h3>
                </div>
                <div class="results-container" id="resultsContainer">
                    <div class="empty-state">
                        <p>暂无测试结果</p>
                        <p class="hint">点击运行测试开始</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function initTheme() {
        const savedTheme = localStorage.getItem('vigo-theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    }
    
    initTheme();
    
    let chart;
    let testResults = {};

    function init() {
        updateTime();
        setInterval(updateTime, 1000);
        
        chart = echarts.init(document.getElementById('mainChart'));
        loadSystemInfo();
        updateChart();
        window.addEventListener('resize', function() { chart.resize(); });
        
        bindEvents();
    }

    function bindEvents() {
        document.getElementById('runAllBtn').addEventListener('click', runAllTests);
        document.getElementById('clearBtn').addEventListener('click', clearResults);
        document.getElementById('dbReadBtn').addEventListener('click', function() { runTest('database_read'); });
        document.getElementById('dbWriteBtn').addEventListener('click', function() { runTest('database_write'); });
        document.getElementById('redisBtn').addEventListener('click', function() { runTest('redis'); });
        document.getElementById('queueBtn').addEventListener('click', function() { runTest('queue'); });
        document.getElementById('qpsBtn').addEventListener('click', function() { runTest('qps'); });
        document.getElementById('memoryBtn').addEventListener('click', function() { runTest('memory'); });
        document.getElementById('mysqlBtn').addEventListener('click', function() { runDatabaseTest('mysql'); });
        document.getElementById('postgresBtn').addEventListener('click', function() { runDatabaseTest('postgres'); });
        document.getElementById('sqliteBtn').addEventListener('click', function() { runDatabaseTest('sqlite3'); });
        document.getElementById('mssqlBtn').addEventListener('click', function() { runDatabaseTest('mssql'); });
    }

    function updateTime() {
        const now = new Date();
        const timeStr = now.toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        });
        const timeEl = document.getElementById('currentTime');
        if (timeEl) timeEl.textContent = timeStr;
    }

    async function loadSystemInfo() {
        try {
            const response = await fetch('/performance/system');
            const data = await response.json();
            if (data.code === 0 || data.code === 200) {
                const info = data.data;
                const cpuCores = document.getElementById('cpuCores');
                const goroutines = document.getElementById('goroutines');
                const memoryAlloc = document.getElementById('memoryAlloc');
                const goVersion = document.getElementById('goVersion');
                const gcCycles = document.getElementById('gcCycles');
                
                if (cpuCores) cpuCores.textContent = info.cpu_cores;
                if (goroutines) goroutines.textContent = info.goroutines;
                if (memoryAlloc) memoryAlloc.textContent = info.memory_alloc.toFixed(2) + ' MB';
                if (goVersion) goVersion.textContent = info.go_version;
                if (gcCycles) gcCycles.textContent = info.gc_cycles;
            }
        } catch (e) {
            console.error('Failed to load system info:', e);
        }
    }

    function showLoading() {
        const loading = document.getElementById('loading');
        loading.classList.add('active');
        let progress = 0;
        const interval = setInterval(function() {
            progress += Math.random() * 10;
            if (progress > 90) progress = 90;
            document.getElementById('progressBar').style.width = progress + '%';
        }, 200);
        return interval;
    }

    function hideLoading(interval) {
        clearInterval(interval);
        document.getElementById('progressBar').style.width = '100%';
        setTimeout(function() {
            const loading = document.getElementById('loading');
            loading.classList.remove('active');
            document.getElementById('progressBar').style.width = '0%';
        }, 300);
    }

    async function runTest(type) {
        const interval = showLoading();
        const concurrency = document.getElementById('concurrency').value;
        const iterations = document.getElementById('iterations').value;
        const duration = document.getElementById('duration').value;

        try {
            const response = await fetch('/performance/run?type=' + type + '&concurrency=' + concurrency + '&iterations=' + iterations + '&duration=' + duration);
            const data = await response.json();
            
            if (data.code === 0 || data.code === 200) {
                for (let key in data.data.results) {
                    testResults[key] = data.data.results[key];
                }
                displayResults(data.data.results);
                updateChart();
                loadSystemInfo();
            } else {
                alert('测试失败: ' + (data.msg || data.message));
            }
        } catch (e) {
            alert('请求失败: ' + e.message);
        } finally {
            hideLoading(interval);
        }
    }

    async function runAllTests() {
        const interval = showLoading();
        const concurrency = document.getElementById('concurrency').value;
        const iterations = document.getElementById('iterations').value;
        const duration = document.getElementById('duration').value;

        try {
            const response = await fetch('/performance/run?type=all&concurrency=' + concurrency + '&iterations=' + iterations + '&duration=' + duration);
            const data = await response.json();
            
            if (data.code === 0 || data.code === 200) {
                testResults = data.data.results;
                displayResults(data.data.results);
                updateChart();
                loadSystemInfo();
            } else {
                alert('测试失败: ' + (data.msg || data.message));
            }
        } catch (e) {
            alert('请求失败: ' + e.message);
        } finally {
            hideLoading(interval);
        }
    }

    async function runDatabaseTest(driver) {
        const interval = showLoading();
        
        try {
            const response = await fetch('/performance/database?driver=' + driver);
            const data = await response.json();
            
            if (data.code === 0 || data.code === 200) {
                const result = data.data.result;
                result.name = data.data.driver;
                testResults['db_' + driver] = result;
                const tempResults = {};
                tempResults['db_' + driver] = result;
                displayResults(tempResults);
                updateChart();
                loadSystemInfo();
            } else {
                alert('测试失败: ' + (data.msg || data.message));
            }
        } catch (e) {
            alert('请求失败: ' + e.message);
        } finally {
            hideLoading(interval);
        }
    }

    async function clearResults() {
        try {
            await fetch('/performance/clear', { method: 'POST' });
            testResults = {};
            document.getElementById('resultsContainer').innerHTML = 
                '<div class="empty-state">' +
                    '<p>暂无测试结果</p>' +
                    '<p class="hint">点击运行测试开始</p>' +
                '</div>';
            updateChart();
        } catch (e) {
            console.error('Failed to clear results:', e);
        }
    }

    function displayResults(results) {
        const container = document.getElementById('resultsContainer');
        
        for (let name in results) {
            const result = results[name];
            let successClass = 'success';
            if (result.success_rate >= 99) {
                successClass = 'success';
            } else if (result.success_rate >= 90) {
                successClass = 'warning';
            } else {
                successClass = 'danger';
            }
            
            const item = document.createElement('div');
            item.className = 'result-item';
            item.innerHTML = 
                '<h4>' + formatTestName(result.name) + '</h4>' +
                '<div class="result-row">' +
                    '<span class="label">总操作数</span>' +
                    '<span class="value">' + result.total_ops.toLocaleString() + '</span>' +
                '</div>' +
                '<div class="result-row">' +
                    '<span class="label">执行时间</span>' +
                    '<span class="value">' + result.duration + '</span>' +
                '</div>' +
                '<div class="result-row">' +
                    '<span class="label">OPS/秒</span>' +
                    '<span class="value success">' + result.ops_per_second.toFixed(2) + '</span>' +
                '</div>' +
                '<div class="result-row">' +
                    '<span class="label">平均延迟</span>' +
                    '<span class="value">' + result.avg_latency + '</span>' +
                '</div>' +
                '<div class="result-row">' +
                    '<span class="label">成功率</span>' +
                    '<span class="value ' + successClass + '">' + result.success_rate.toFixed(2) + '%</span>' +
                '</div>';
            container.insertBefore(item, container.firstChild);
        }
        
        const emptyState = container.querySelector('.empty-state');
        if (emptyState) {
            emptyState.remove();
        }
    }

    function formatTestName(name) {
        const names = {
            'database_read': '📊 数据库读取',
            'database_write': '📝 数据库写入',
            'redis': '⚡ Redis缓存',
            'queue': '📬 队列处理',
            'qps': '📈 QPS测试',
            'memory': '💾 内存分配'
        };
        return names[name] || name;
    }

    function updateChart() {
        const names = [];
        const opsData = [];
        const latencyData = [];
        
        for (let n in testResults) {
            names.push(n);
            opsData.push(testResults[n].ops_per_second);
            const lat = testResults[n].avg_latency;
            const match = lat.match(/(\d+(?:\.\d+)?)/);
            latencyData.push(match ? parseFloat(match[0]) : 0);
        }

        const option = {
            backgroundColor: 'transparent',
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            legend: {
                data: ['OPS/秒', '平均延迟'],
                textStyle: { color: '#94a3b8' }
            },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: {
                type: 'category',
                data: names.map(formatTestName),
                axisLabel: { color: '#94a3b8', rotate: 30 },
                axisLine: { lineStyle: { color: '#334155' } }
            },
            yAxis: [
                {
                    type: 'value',
                    name: 'OPS/秒',
                    axisLabel: { color: '#94a3b8' },
                    axisLine: { lineStyle: { color: '#334155' } },
                    splitLine: { lineStyle: { color: '#334155' } }
                },
                {
                    type: 'value',
                    name: '延迟',
                    axisLabel: { color: '#94a3b8' },
                    axisLine: { lineStyle: { color: '#334155' } },
                    splitLine: { show: false }
                }
            ],
            series: [
                {
                    name: 'OPS/秒',
                    type: 'bar',
                    data: opsData,
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#3b82f6' },
                            { offset: 1, color: '#10b981' }
                        ])
                    }
                },
                {
                    name: '平均延迟',
                    type: 'line',
                    yAxisIndex: 1,
                    data: latencyData,
                    smooth: true,
                    lineStyle: { color: '#f59e0b', width: 3 },
                    itemStyle: { color: '#f59e0b' }
                }
            ]
        };

        chart.setOption(option, true);
    }

    init();
    setInterval(loadSystemInfo, 5000);
</script>
</body>
</html>
