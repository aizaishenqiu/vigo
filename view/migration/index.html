<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.title}}</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 40px 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        color: white;
        margin-bottom: 40px;
      }

      .header h1 {
        font-size: 36px;
        margin-bottom: 10px;
      }

      .header p {
        font-size: 16px;
        opacity: 0.9;
      }

      .card {
        background: white;
        border-radius: 12px;
        padding: 30px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .card h2 {
        font-size: 24px;
        margin-bottom: 20px;
        color: #333;
      }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .status-item {
        background: #f7fafc;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
      }

      .status-item .label {
        font-size: 14px;
        color: #718096;
        margin-bottom: 10px;
      }

      .status-item .value {
        font-size: 32px;
        font-weight: bold;
        color: #2d3748;
      }

      .status-item .value.success {
        color: #48bb78;
      }

      .status-item .value.warning {
        color: #ed8936;
      }

      .button-group {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
      }

      .btn-primary {
        background: #667eea;
        color: white;
      }

      .btn-primary:hover {
        background: #5a67d8;
      }

      .btn-warning {
        background: #ed8936;
        color: white;
      }

      .btn-warning:hover {
        background: #dd6b20;
      }

      .btn-danger {
        background: #f56565;
        color: white;
      }

      .btn-danger:hover {
        background: #e53e3e;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .migration-list {
        list-style: none;
      }

      .migration-item {
        padding: 15px;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .migration-item:last-child {
        border-bottom: none;
      }

      .migration-item .version {
        font-family: monospace;
        color: #4a5568;
        font-size: 14px;
      }

      .migration-item .name {
        flex: 1;
        margin: 0 20px;
        color: #2d3748;
      }

      .migration-item .status {
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
      }

      .status-applied {
        background: #c6f6d5;
        color: #22543d;
      }

      .status-pending {
        background: #feebc8;
        color: #7c2d12;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: #718096;
      }

      .alert {
        padding: 15px 20px;
        border-radius: 6px;
        margin-bottom: 20px;
      }

      .alert-warning {
        background: #fffaf0;
        border-left: 4px solid #ed8936;
        color: #7c2d12;
      }

      .alert-success {
        background: #f0fff4;
        border-left: 4px solid #48bb78;
        color: #22543d;
      }

      .alert-error {
        background: #fff5f5;
        border-left: 4px solid #f56565;
        color: #742a2a;
      }

      /* 上传区域样式 */
      .upload-section {
        margin-bottom: 20px;
      }

      .upload-area {
        border: 2px dashed #667eea;
        border-radius: 8px;
        padding: 40px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        background: #f7fafc;
      }

      .upload-area:hover {
        border-color: #5a67d8;
        background: #edf2f7;
      }

      .upload-area.dragover {
        border-color: #48bb78;
        background: #f0fff4;
      }

      .upload-icon {
        font-size: 48px;
        margin-bottom: 15px;
      }

      .upload-text {
        font-size: 16px;
        color: #2d3748;
        margin-bottom: 8px;
      }

      .upload-hint {
        font-size: 14px;
        color: #718096;
      }

      .file-list {
        margin-top: 15px;
      }

      .file-item {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .file-name {
        font-size: 14px;
        color: #2d3748;
        flex: 1;
      }

      .file-size {
        font-size: 12px;
        color: #718096;
        margin-left: 10px;
      }

      .file-remove {
        background: #f56565;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 4px 8px;
        cursor: pointer;
        font-size: 12px;
      }

      .file-remove:hover {
        background: #e53e3e;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🔄 数据迁移管理</h1>
        <p>管理数据库 Schema 版本控制和迁移</p>
      </div>

      <div class="card">
        <h2>📁 上传迁移文件</h2>
        <div class="upload-section">
          <div class="upload-area" id="uploadArea">
            <input type="file" id="migrationFile" accept=".sql,.go" multiple style="display: none;" />
            <div class="upload-icon">📤</div>
            <div class="upload-text">点击选择或拖拽迁移文件到此处</div>
            <div class="upload-hint">支持 .sql 或 .go 格式</div>
          </div>
          <div id="fileList" class="file-list"></div>
          <button class="btn btn-primary" onclick="uploadMigrations()" style="margin-top: 15px;">
            ⬆️ 上传并执行
          </button>
        </div>
      </div>

      <div class="card">
        <h2>迁移状态</h2>
        <div id="statusGrid" class="status-grid">
          <div class="loading">加载中...</div>
        </div>

        <div id="alertContainer"></div>

        <div class="button-group">
          <button class="btn btn-primary" onclick="loadStatus()">
            🔄 刷新状态
          </button>
          <button class="btn btn-primary" onclick="runMigrate()">
            ▶️ 执行迁移
          </button>
          <button class="btn btn-warning" onclick="runRollback()">
            ⏮️ 回滚迁移
          </button>
          <button class="btn btn-danger" onclick="runReset()">
            ⚠️ 重置所有
          </button>
        </div>
      </div>

      <div class="card">
        <h2>已应用的迁移</h2>
        <ul id="appliedList" class="migration-list">
          <li class="loading">加载中...</li>
        </ul>
      </div>

      <div class="card">
        <h2>待执行的迁移</h2>
        <ul id="pendingList" class="migration-list">
          <li class="loading">加载中...</li>
        </ul>
      </div>
    </div>

    <script>
      // 文件上传相关
      let selectedFiles = [];

      // 初始化上传区域
      function initUpload() {
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('migrationFile');

        // 点击上传区域
        uploadArea.addEventListener('click', () => fileInput.click());

        // 文件选择
        fileInput.addEventListener('change', (e) => {
          handleFiles(e.target.files);
        });

        // 拖拽事件
        uploadArea.addEventListener('dragover', (e) => {
          e.preventDefault();
          uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
          uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
          e.preventDefault();
          uploadArea.classList.remove('dragover');
          handleFiles(e.dataTransfer.files);
        });
      }

      // 处理文件
      function handleFiles(files) {
        const validTypes = ['.sql', '.go'];
        
        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          const ext = '.' + file.name.split('.').pop().toLowerCase();
          
          if (validTypes.includes(ext)) {
            selectedFiles.push(file);
          } else {
            showAlert(`文件 ${file.name} 格式不支持`, 'error');
          }
        }
        
        updateFileList();
      }

      // 更新文件列表
      function updateFileList() {
        const fileList = document.getElementById('fileList');
        
        if (selectedFiles.length === 0) {
          fileList.innerHTML = '';
          return;
        }

        fileList.innerHTML = selectedFiles.map((file, index) => `
          <div class="file-item">
            <span class="file-name">📄 ${file.name}</span>
            <span class="file-size">${formatFileSize(file.size)}</span>
            <button class="file-remove" onclick="removeFile(${index})">✕</button>
          </div>
        `).join('');
      }

      // 移除文件
      function removeFile(index) {
        selectedFiles.splice(index, 1);
        updateFileList();
      }

      // 格式化文件大小
      function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
      }

      // 上传并执行迁移
      async function uploadMigrations() {
        if (selectedFiles.length === 0) {
          showAlert('请先选择文件', 'error');
          return;
        }

        const formData = new FormData();
        selectedFiles.forEach(file => {
          formData.append('files', file);
        });

        try {
          const response = await fetch('/api/migration/upload', {
            method: 'POST',
            body: formData
          });
          
          const result = await response.json();
          
          if (result.code === 0) {
            showAlert('上传成功，开始执行迁移...', 'success');
            // 上传成功后自动执行迁移
            setTimeout(runMigrate, 1000);
            selectedFiles = [];
            updateFileList();
            document.getElementById('migrationFile').value = '';
          } else {
            showAlert('上传失败：' + result.msg, 'error');
          }
        } catch (error) {
          showAlert('请求失败：' + error.message, 'error');
        }
      }

      // 加载迁移状态
      async function loadStatus() {
        try {
          const response = await fetch("/api/migration/status");
          const result = await response.json();

          if (result.code === 0) {
            updateStatusGrid(result.data);
            updateMigrationLists(result.data);
            showAlert("状态加载成功", "success");
          } else {
            showAlert("加载状态失败：" + result.msg, "error");
          }
        } catch (error) {
          showAlert("请求失败：" + error.message, "error");
        }
      }

      // 更新状态网格
      function updateStatusGrid(data) {
        const grid = document.getElementById("statusGrid");
        grid.innerHTML = `
                <div class="status-item">
                    <div class="label">当前版本</div>
                    <div class="value">${data.current_version || "0"}</div>
                </div>
                <div class="status-item">
                    <div class="label">总迁移数</div>
                    <div class="value">${data.total || 0}</div>
                </div>
                <div class="status-item">
                    <div class="label">已应用</div>
                    <div class="value success">${(data.applied || []).length}</div>
                </div>
                <div class="status-item">
                    <div class="label">待执行</div>
                    <div class="value warning">${(data.pending || []).length}</div>
                </div>
            `;
      }

      // 更新迁移列表
      function updateMigrationLists(data) {
        // 已应用的迁移
        const appliedList = document.getElementById("appliedList");
        if (data.applied && data.applied.length > 0) {
          appliedList.innerHTML = data.applied
            .map(
              (m) => `
                    <li class="migration-item">
                        <span class="version">${m.version}</span>
                        <span class="name">${m.name}</span>
                        <span class="status status-applied">✓ 已应用</span>
                    </li>
                `,
            )
            .join("");
        } else {
          appliedList.innerHTML = '<li class="loading">暂无已应用的迁移</li>';
        }

        // 待执行的迁移
        const pendingList = document.getElementById("pendingList");
        if (data.pending && data.pending.length > 0) {
          pendingList.innerHTML = data.pending
            .map(
              (m) => `
                    <li class="migration-item">
                        <span class="version">${m.version}</span>
                        <span class="name">${m.name}</span>
                        <span class="status status-pending">⏳ 待执行</span>
                    </li>
                `,
            )
            .join("");
        } else {
          pendingList.innerHTML = '<li class="loading">所有迁移已执行</li>';
        }
      }

      // 执行迁移
      async function runMigrate() {
        if (!confirm("确定要执行所有未应用的迁移吗？")) {
          return;
        }

        try {
          const response = await fetch("/api/migration/migrate", {
            method: "POST",
          });
          const result = await response.json();

          if (result.code === 0) {
            showAlert("迁移执行成功", "success");
            setTimeout(loadStatus, 1000);
          } else {
            showAlert("迁移失败：" + result.msg, "error");
          }
        } catch (error) {
          showAlert("请求失败：" + error.message, "error");
        }
      }

      // 回滚迁移
      async function runRollback() {
        const steps = prompt("请输入回滚步数（默认 1）:", "1");
        if (!steps) {
          return;
        }

        if (!confirm(`确定要回滚 ${steps} 步迁移吗？`)) {
          return;
        }

        try {
          const response = await fetch(
            `/api/migration/rollback?steps=${steps}`,
            { method: "POST" },
          );
          const result = await response.json();

          if (result.code === 0) {
            showAlert("回滚成功", "success");
            setTimeout(loadStatus, 1000);
          } else {
            showAlert("回滚失败：" + result.msg, "error");
          }
        } catch (error) {
          showAlert("请求失败：" + error.message, "error");
        }
      }

      // 重置所有迁移
      async function runReset() {
        if (
          !confirm(
            "⚠️ 警告：此操作将删除所有迁移记录并回滚所有迁移！确定继续吗？",
          )
        ) {
          return;
        }

        const confirmText = prompt('请输入 "RESET" 确认操作：');
        if (confirmText !== "RESET") {
          showAlert("操作已取消", "error");
          return;
        }

        try {
          const response = await fetch("/api/migration/reset", {
            method: "POST",
          });
          const result = await response.json();

          if (result.code === 0) {
            showAlert("重置成功", "success");
            setTimeout(loadStatus, 1000);
          } else {
            showAlert("重置失败：" + result.msg, "error");
          }
        } catch (error) {
          showAlert("请求失败：" + error.message, "error");
        }
      }

      // 显示提示消息
      function showAlert(message, type) {
        const container = document.getElementById("alertContainer");
        const alert = document.createElement("div");
        alert.className = `alert alert-${type}`;
        alert.textContent = message;
        container.appendChild(alert);

        setTimeout(() => {
          alert.remove();
        }, 5000);
      }

      // 页面加载时自动加载状态
      window.onload = function() {
        initUpload();
        loadStatus();
      };
    </script>
  </body>
</html>
