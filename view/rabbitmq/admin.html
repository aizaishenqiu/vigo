<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RabbitMQ 管理 - Vigo</title>
    <style>
        /* 深色主题 */
        :root { --bg:#020617; --card:#111827; --text:#f9fafb; --sub:#9ca3af; --blue:#3b82f6; --green:#10b981; --red:#ef4444; --orange:#f59e0b; --border:#374151; }
        
        /* 浅色主题 */
        [data-theme="light"] { --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --sub:#64748b; --blue:#3b82f6; --green:#10b981; --red:#ef4444; --orange:#f59e0b; --border:#e2e8f0; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #ff6b35, #f7931e); padding: 20px 30px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; color: #fff; }
        .header .logo { display: flex; align-items: center; gap: 10px; }
        .header .logo svg { width: 40px; height: 40px; }
        .status-badge { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px; font-size: 14px; }
        .status-badge.connected { background: #10b981; }
        .status-badge.disconnected { background: #ef4444; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: #16213e; border-radius: 12px; padding: 20px; border: 1px solid #0f3460; }
        .card h3 { color: #ff6b35; margin-bottom: 15px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .card h3 svg { width: 20px; height: 20px; }
        .stat { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #0f3460; }
        .stat:last-child { border-bottom: none; }
        .stat-label { color: #888; }
        .stat-value { font-weight: 600; color: #fff; }
        .stat-value.success { color: #10b981; }
        .stat-value.warning { color: #f59e0b; }
        .stat-value.danger { color: #ef4444; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { background: #16213e; border: 1px solid #0f3460; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .tab:hover, .tab.active { background: #ff6b35; border-color: #ff6b35; }
        .table-container { background: #16213e; border-radius: 12px; overflow: hidden; border: 1px solid #0f3460; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #0f3460; }
        th { background: #0f3460; color: #ff6b35; font-weight: 600; }
        tr:hover { background: rgba(255,107,53,0.1); }
        .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: #f59e0b; color: #000; }
        .btn-warning:hover { background: #d97706; }
        .btn-primary { background: #ff6b35; color: #fff; }
        .btn-primary:hover { background: #e55a2b; }
        .actions { display: flex; gap: 8px; }
        .info-box { background: #0f3460; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .info-box h4 { color: #ff6b35; margin-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; padding: 5px 0; }
        .refresh-btn { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background: #ff6b35; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,107,53,0.4); transition: transform 0.3s; }
        .refresh-btn:hover { transform: scale(1.1); }
        .refresh-btn svg { width: 24px; height: 24px; fill: #fff; }
        .empty-state { text-align: center; padding: 40px; color: #666; }
        .empty-state svg { width: 60px; height: 60px; margin-bottom: 15px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="white">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                <h1>RabbitMQ 管理</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <a href="/" style="background: rgba(255,255,255,0.2); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 500;">返回首页</a>
                <div class="status-badge {{if .enabled}}connected{{else}}disconnected{{end}}">
                    {{if .enabled}}已连接{{else}}未启用{{end}}
                </div>
            </div>
        </div>

        <div class="info-box">
            <h4>连接信息</h4>
            <div class="info-row"><span>主机:</span><span>{{.host}}:{{.port}}</span></div>
            <div class="info-row"><span>虚拟主机:</span><span>{{.vhost}}</span></div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>
                    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-4H6v-2h4V7h2v4h4v2h-4v4z"/></svg>
                    队列统计
                </h3>
                <div class="stat"><span class="stat-label">总队列数</span><span class="stat-value" id="queue-count">-</span></div>
                <div class="stat"><span class="stat-label">待处理消息</span><span class="stat-value" id="pending-messages">-</span></div>
                <div class="stat"><span class="stat-label">消费者数</span><span class="stat-value" id="consumer-count">-</span></div>
            </div>
            <div class="card">
                <h3>
                    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    交换器统计
                </h3>
                <div class="stat"><span class="stat-label">交换器数</span><span class="stat-value" id="exchange-count">-</span></div>
                <div class="stat"><span class="stat-label">绑定数</span><span class="stat-value" id="binding-count">-</span></div>
            </div>
            <div class="card">
                <h3>
                    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    连接统计
                </h3>
                <div class="stat"><span class="stat-label">活跃连接</span><span class="stat-value" id="connection-count">-</span></div>
                <div class="stat"><span class="stat-label">通道数</span><span class="stat-value" id="channel-count">-</span></div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="queues">队列</div>
            <div class="tab" data-tab="exchanges">交换器</div>
            <div class="tab" data-tab="connections">连接</div>
        </div>

        <div class="table-container">
            <table id="queues-table">
                <thead>
                    <tr>
                        <th>队列名称</th>
                        <th>消息数</th>
                        <th>消费者</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="queues-body">
                    <tr><td colspan="5" class="empty-state">加载中...</td></tr>
                </tbody>
            </table>
            <table id="exchanges-table" style="display:none">
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>类型</th>
                        <th>绑定</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="exchanges-body">
                    <tr><td colspan="4" class="empty-state">加载中...</td></tr>
                </tbody>
            </table>
            <table id="connections-table" style="display:none">
                <thead>
                    <tr>
                        <th>客户端</th>
                        <th>用户</th>
                        <th>通道</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="connections-body">
                    <tr><td colspan="4" class="empty-state">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshAll()" title="刷新">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>

    <script>
        const tabs = document.querySelectorAll('.tab');
        const tables = { queues: document.getElementById('queues-table'), exchanges: document.getElementById('exchanges-table'), connections: document.getElementById('connections-table') };

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                Object.values(tables).forEach(t => t.style.display = 'none');
                tables[tab.dataset.tab].style.display = 'table';
            });
        });

        async function loadQueues() {
            try {
                const res = await fetch('/admin/rabbitmq/queues');
                const data = await res.json();
                const tbody = document.getElementById('queues-body');
                if (data.data && data.data.length > 0) {
                    tbody.innerHTML = data.data.map(q => `
                        <tr>
                            <td>${q.name}</td>
                            <td>${q.messages}</td>
                            <td>${q.consumers}</td>
                            <td><span class="stat-value success">运行中</span></td>
                            <td class="actions">
                                <button class="btn btn-warning" onclick="purgeQueue('${q.name}')">清空</button>
                                <button class="btn btn-danger" onclick="deleteQueue('${q.name}')">删除</button>
                            </td>
                        </tr>
                    `).join('');
                    document.getElementById('queue-count').textContent = data.data.length;
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">暂无队列</td></tr>';
                    document.getElementById('queue-count').textContent = '0';
                }
            } catch (e) {
                document.getElementById('queues-body').innerHTML = '<tr><td colspan="5" class="empty-state">加载失败</td></tr>';
            }
        }

        async function loadExchanges() {
            try {
                const res = await fetch('/admin/rabbitmq/exchanges');
                const data = await res.json();
                const tbody = document.getElementById('exchanges-body');
                if (data.data && data.data.length > 0) {
                    tbody.innerHTML = data.data.map(e => `
                        <tr>
                            <td>${e.name}</td>
                            <td>${e.type}</td>
                            <td>-</td>
                            <td><span class="stat-value success">正常</span></td>
                        </tr>
                    `).join('');
                    document.getElementById('exchange-count').textContent = data.data.length;
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无交换器</td></tr>';
                }
            } catch (e) {
                document.getElementById('exchanges-body').innerHTML = '<tr><td colspan="4" class="empty-state">加载失败</td></tr>';
            }
        }

        async function loadConnections() {
            try {
                const res = await fetch('/admin/rabbitmq/connections');
                const data = await res.json();
                const tbody = document.getElementById('connections-body');
                if (data.data && data.data.length > 0) {
                    tbody.innerHTML = data.data.map(c => `
                        <tr>
                            <td>${c.client}</td>
                            <td>${c.user}</td>
                            <td>${c.channels}</td>
                            <td><span class="stat-value success">已连接</span></td>
                        </tr>
                    `).join('');
                    document.getElementById('connection-count').textContent = data.data.length;
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无连接</td></tr>';
                    document.getElementById('connection-count').textContent = '0';
                }
            } catch (e) {
                document.getElementById('connections-body').innerHTML = '<tr><td colspan="4" class="empty-state">加载失败</td></tr>';
            }
        }

        async function purgeQueue(name) {
            if (confirm('确定要清空队列 ' + name + ' 吗？')) {
                await fetch('/admin/rabbitmq/queue/' + name + '/purge', { method: 'POST' });
                loadQueues();
            }
        }

        async function deleteQueue(name) {
            if (confirm('确定要删除队列 ' + name + ' 吗？')) {
                await fetch('/admin/rabbitmq/queue/' + name, { method: 'DELETE' });
                loadQueues();
            }
        }

        function refreshAll() {
            loadQueues();
            loadExchanges();
            loadConnections();
        }

        refreshAll();
        setInterval(refreshAll, 30000);
    </script>
</body>
</html>
