<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.title}}</title>
  <script src="/admin/static/echarts/echarts.min.js"></script>
  <style>
    :root {
      --bg-color: #020617;
      --card-bg: #111827;
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --accent-color: #3b82f6;
      --success-color: #10b981;
      --danger-color: #ef4444;
      --warning-color: #f59e0b;
      --purple-color: #8b5cf6;
      --border-color: #374151;
      --input-bg: #1f2937;
      --input-border: #4b5563;
    }

    [data-theme="light"] {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --accent-color: #3b82f6;
      --success-color: #10b981;
      --danger-color: #ef4444;
      --warning-color: #f59e0b;
      --purple-color: #8b5cf6;
      --border-color: #e2e8f0;
      --input-bg: #f1f5f9;
      --input-border: #cbd5e1;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1920px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card-bg);
      padding: 15px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .navbar-brand h1 {
      font-size: 20px;
      font-weight: 600;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .navbar-brand .subtitle {
      color: var(--text-secondary);
      font-size: 12px;
      margin-top: 4px;
    }

    .system-monitor {
      display: flex;
      gap: 20px;
      align-items: center;
      background: var(--input-bg);
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .tab-bar {
      display: flex;
      gap: 0;
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
    }

    .tab-btn {
      flex: 1;
      border: none;
      padding: 12px 20px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      background: transparent;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent-color);
      color: white;
    }

    .tab-btn:hover:not(.active) {
      background: var(--border-color);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .config-panel {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px 30px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
      align-items: end;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .config-group label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    input[type="number"],
    input[type="text"],
    select {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-primary);
      padding: 8px 12px;
      border-radius: 6px;
      width: 100%;
      height: 36px;
      font-family: inherit;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--accent-color);
    }

    .module-group {
      grid-column: span 3;
      display: flex;
      gap: 20px;
      align-items: center;
      height: 36px;
      background: var(--input-bg);
      padding: 0 15px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
    }

    .module-group label {
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      margin: 0;
    }

    .actions {
      grid-column: span 3;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .btn {
      border: none;
      padding: 0 24px;
      height: 36px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: var(--accent-color);
      color: white;
    }

    .btn-danger {
      background: var(--danger-color);
      color: white;
    }

    .btn-secondary {
      background: var(--border-color);
      color: var(--text-primary);
    }

    .btn-purple {
      background: var(--purple-color);
      color: white;
    }

    .btn:hover {
      filter: brightness(110%);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status-bar {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--input-bg);
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status-badge.connected {
      border-color: rgba(16, 185, 129, 0.3);
      color: #10b981;
      background: rgba(16, 185, 129, 0.1);
    }

    .status-badge.disconnected {
      border-color: rgba(239, 68, 68, 0.3);
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 16px;
    }

    .metric-card {
      background: var(--card-bg);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent-color);
      margin: 8px 0;
    }

    .metric-label {
      color: var(--text-secondary);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .chart-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      min-height: 320px;
    }

    .chart-container {
      width: 100%;
      height: 280px;
    }

    h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: var(--text-secondary);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="navbar">
      <div class="navbar-brand">
        <h1>⚡ Vigo 压测监控大屏</h1>
        <div class="subtitle">实时全链路性能监控系统</div>
      </div>

      <div style="display: flex; align-items: center; gap: 20px;">
        <a href="/admin" class="btn"
          style="background: var(--accent-color); color: white; text-decoration: none;">返回首页</a>
        <div class="system-monitor">
          <div style="display: flex; align-items: center; gap: 10px;">
            <span style="color: #94a3b8; font-size: 12px; font-weight: 600;">CPU</span>
            <div style="width: 100px; height: 6px; background: #334155; border-radius: 3px; overflow: hidden;">
              <div id="bar-cpu" style="width: 0%; height: 100%; background: #3b82f6; transition: width 0.5s;"></div>
            </div>
            <span id="val-cpu"
              style="font-size: 12px; font-weight: bold; width: 45px; color: #e2e8f0; text-align: right;">0%</span>
          </div>
          <div style="width: 1px; height: 16px; background: #334155;"></div>
          <div style="display: flex; align-items: center; gap: 10px;">
            <span style="color: #94a3b8; font-size: 12px; font-weight: 600;">MEM</span>
            <div style="width: 100px; height: 6px; background: #334155; border-radius: 3px; overflow: hidden;">
              <div id="bar-mem" style="width: 0%; height: 100%; background: #f59e0b; transition: width 0.5s;"></div>
            </div>
            <span id="val-mem" style="font-size: 12px; font-weight: bold; color: #e2e8f0;">0 GB</span>
          </div>
          <div style="width: 1px; height: 16px; background: #334155;"></div>
          <div style="display: flex; align-items: center; gap: 10px;">
            <span style="color: #94a3b8; font-size: 12px; font-weight: 600;">NET</span>
            <span id="val-net" style="font-size: 12px; font-weight: bold; color: #10b981;">0 KB/s</span>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('middleware')">中间件压测</button>
      <button class="tab-btn" onclick="switchTab('http')">HTTP 接口压测</button>
    </div>

    <div id="tab-middleware" class="tab-content active">
      <div class="config-panel">
        <div class="config-group">
          <label>并发数</label>
          <input type="number" id="concurrency" value="50" min="1" max="500">
        </div>
        <div class="config-group">
          <label>持续时间 (s)</label>
          <input type="number" id="duration" value="10" min="1" max="300">
        </div>
        <div class="config-group">
          <label>DB 操作量</label>
          <input type="number" id="db_count" value="10000" min="0" max="1000000">
        </div>
        <div class="config-group">
          <label>MQ 消息量</label>
          <input type="number" id="mq_count" value="10000" min="0" max="1000000">
        </div>
        <div class="config-group">
          <label>DB 模式</label>
          <select id="db_mode">
            <option value="read">读模式</option>
            <option value="write">写模式</option>
          </select>
        </div>
        <div class="config-group">
          <label>内存负载 (MB)</label>
          <input type="number" id="memory_load" value="0" min="0" max="2048">
        </div>

        <div class="module-group">
          <span style="color: var(--text-secondary); font-size: 12px;">启用模块:</span>
          <label><input type="checkbox" id="enable_db" checked> MySQL</label>
          <label><input type="checkbox" id="enable_redis" checked> Redis</label>
          <label><input type="checkbox" id="enable_mq"> MQ</label>
        </div>

        <div class="actions">
          <button id="startBtn" class="btn btn-primary" onclick="startTest()">▶ 开始压测</button>
          <button id="stopBtn" class="btn btn-danger" onclick="stopTest()" disabled>⏹ 停止</button>
          <button class="btn btn-secondary" onclick="clearData()">🗑 清除数据</button>
        </div>
      </div>
    </div>

    <div id="tab-http" class="tab-content">
      <div class="config-panel" style="grid-template-columns: repeat(5, 1fr);">
        <div class="config-group">
          <label>并发连接数</label>
          <input type="number" id="http_concurrency" value="50" min="1" max="1000">
        </div>
        <div class="config-group">
          <label>持续时间 (s)</label>
          <input type="number" id="http_duration" value="10" min="1" max="300">
        </div>
        <div class="config-group" style="grid-column: span 2;">
          <label>目标 URL</label>
          <input type="text" id="http_target" value="http://127.0.0.1:8080/health"
            placeholder="http://127.0.0.1:8080/hello">
        </div>
        <div class="config-group">
          <label>请求方法</label>
          <select id="http_method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
          </select>
        </div>

        <div class="actions" style="grid-column: span 5;">
          <button id="httpStartBtn" class="btn btn-purple" onclick="startHTTPTest()">▶ 开始 HTTP 压测</button>
          <button id="httpStopBtn" class="btn btn-danger" onclick="stopTest()" disabled>⏹ 停止</button>
          <button class="btn btn-secondary" onclick="clearData()">🗑 清除数据</button>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-badge" id="status-db">
        <div class="status-dot"></div>
        <span>MySQL: 检测中</span>
      </div>
      <div class="status-badge" id="status-redis">
        <div class="status-dot"></div>
        <span>Redis: 检测中</span>
      </div>
      <div class="status-badge" id="status-mq">
        <div class="status-dot"></div>
        <span>MQ: 检测中</span>
      </div>
      <div class="status-badge" id="status-mode"
        style="margin-left: auto; border-color: rgba(139,92,246,0.3); color: #8b5cf6; background: rgba(139,92,246,0.1);">
        <span>待命</span>
      </div>
    </div>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">当前 QPS</div>
        <div class="metric-value" id="val-qps">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">平均延迟 (ms)</div>
        <div class="metric-value" id="val-latency" style="color: var(--warning-color)">0.0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">P95 延迟 (ms)</div>
        <div class="metric-value" id="val-p95" style="color: #f97316">0.0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">P99 延迟 (ms)</div>
        <div class="metric-value" id="val-p99" style="color: var(--danger-color)">0.0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">活跃并发</div>
        <div class="metric-value" id="val-workers" style="color: var(--success-color)">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">剩余时间 (s)</div>
        <div class="metric-value" id="val-remaining" style="color: var(--text-primary)">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">总请求数</div>
        <div class="metric-value" id="val-total">0</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <h3>📈 QPS 趋势</h3>
        <div id="chart-qps" class="chart-container"></div>
      </div>
      <div class="chart-card">
        <h3>⏱ 延迟分布 (ms)</h3>
        <div id="chart-latency" class="chart-container"></div>
      </div>
      <div class="chart-card">
        <h3>💻 CPU 使用率</h3>
        <div id="chart-cpu" class="chart-container"></div>
      </div>
      <div class="chart-card">
        <h3>🧠 内存使用</h3>
        <div id="chart-memory" class="chart-container"></div>
      </div>
      <div class="chart-card">
        <h3>🔌 中间件吞吐</h3>
        <div id="chart-middleware" class="chart-container"></div>
      </div>
      <div class="chart-card">
        <h3>✅ 成功/失败</h3>
        <div id="chart-success" class="chart-container"></div>
      </div>
    </div>
  </div>

  <script>
    let isRunning = false;
    let currentTab = 'middleware';
    let updateTimer = null;
    let charts = {};
    let data = {
      time: [], qps: [], latency: [], p95: [], p99: [],
      mq: [], redis: [], mysql: [], http: [],
      success: [], failed: [],
      cpu: [], memUsed: [], memTotal: []
    };
    const MAX_POINTS = 50;

    function initCharts() {
      charts = {
        qps: echarts.init(document.getElementById('chart-qps')),
        latency: echarts.init(document.getElementById('chart-latency')),
        cpu: echarts.init(document.getElementById('chart-cpu')),
        memory: echarts.init(document.getElementById('chart-memory')),
        middleware: echarts.init(document.getElementById('chart-middleware')),
        success: echarts.init(document.getElementById('chart-success'))
      };

      const commonOption = {
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        legend: { textStyle: { color: '#9ca3af' }, top: 0 }
      };

      charts.qps.setOption({
        ...commonOption,
        xAxis: { type: 'category', data: data.time, axisLine: { lineStyle: { color: '#374151' } } },
        yAxis: { type: 'value', axisLine: { lineStyle: { color: '#374151' } }, splitLine: { lineStyle: { color: '#1f2937' } } },
        series: [{ name: 'QPS', type: 'line', data: data.qps, smooth: true, lineStyle: { color: '#3b82f6' }, areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(59,130,246,0.3)' }, { offset: 1, color: 'rgba(59,130,246,0)' }]) } }]
      });

      charts.latency.setOption({
        ...commonOption,
        xAxis: { type: 'category', data: data.time, axisLine: { lineStyle: { color: '#374151' } } },
        yAxis: { type: 'value', axisLine: { lineStyle: { color: '#374151' } }, splitLine: { lineStyle: { color: '#1f2937' } } },
        series: [
          { name: 'Avg', type: 'line', data: data.latency, smooth: true, lineStyle: { color: '#f59e0b' } },
          { name: 'P95', type: 'line', data: data.p95, smooth: true, lineStyle: { color: '#f97316' } },
          { name: 'P99', type: 'line', data: data.p99, smooth: true, lineStyle: { color: '#ef4444' } }
        ]
      });

      charts.cpu.setOption({
        ...commonOption,
        xAxis: { type: 'category', data: data.time, axisLine: { lineStyle: { color: '#374151' } } },
        yAxis: { type: 'value', max: 100, axisLine: { lineStyle: { color: '#374151' } }, splitLine: { lineStyle: { color: '#1f2937' } } },
        series: [{ name: 'CPU %', type: 'line', data: data.cpu, smooth: true, lineStyle: { color: '#3b82f6' }, areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(59,130,246,0.3)' }, { offset: 1, color: 'rgba(59,130,246,0)' }]) } }]
      });

      charts.memory.setOption({
        ...commonOption,
        xAxis: { type: 'category', data: data.time, axisLine: { lineStyle: { color: '#374151' } } },
        yAxis: { type: 'value', axisLine: { lineStyle: { color: '#374151' } }, splitLine: { lineStyle: { color: '#1f2937' } } },
        series: [
          { name: 'Used', type: 'line', data: data.memUsed, smooth: true, lineStyle: { color: '#f59e0b' } },
          { name: 'Total', type: 'line', data: data.memTotal, smooth: true, lineStyle: { color: '#6b7280' } }
        ]
      });

      charts.middleware.setOption({
        ...commonOption,
        xAxis: { type: 'category', data: data.time, axisLine: { lineStyle: { color: '#374151' } } },
        yAxis: { type: 'value', axisLine: { lineStyle: { color: '#374151' } }, splitLine: { lineStyle: { color: '#1f2937' } } },
        series: [
          { name: 'MySQL', type: 'line', data: data.mysql, smooth: true, lineStyle: { color: '#3b82f6' } },
          { name: 'Redis', type: 'line', data: data.redis, smooth: true, lineStyle: { color: '#ef4444' } },
          { name: 'MQ', type: 'line', data: data.mq, smooth: true, lineStyle: { color: '#8b5cf6' } }
        ]
      });

      charts.success.setOption({
        ...commonOption,
        xAxis: { type: 'category', data: data.time, axisLine: { lineStyle: { color: '#374151' } } },
        yAxis: { type: 'value', axisLine: { lineStyle: { color: '#374151' } }, splitLine: { lineStyle: { color: '#1f2937' } } },
        series: [
          { name: '成功', type: 'line', data: data.success, smooth: true, lineStyle: { color: '#10b981' } },
          { name: '失败', type: 'line', data: data.failed, smooth: true, lineStyle: { color: '#ef4444' } }
        ]
      });

      window.addEventListener('resize', () => {
        Object.values(charts).forEach(chart => chart.resize());
      });
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
      return '';
    }

    async function startTest() {
      const params = {
        concurrency: document.getElementById('concurrency').value,
        duration: document.getElementById('duration').value,
        db_count: document.getElementById('db_count').value,
        mq_count: document.getElementById('mq_count').value,
        enable_insert: document.getElementById('db_mode').value === 'write',
        memory_load: document.getElementById('memory_load').value,
        enable_db: document.getElementById('enable_db').checked,
        enable_redis: document.getElementById('enable_redis').checked,
        enable_mq: document.getElementById('enable_mq').checked
      };

      try {
        const res = await fetch('/admin/api/stress/start', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRF-Token': getCookie('csrf_token')
          },
          body: new URLSearchParams(params)
        });
        const result = await res.json();
        if (res.ok && result.code === 0) {
          isRunning = true;
          updateButtons();
          startUpdates();
          showStatus('mode', '运行中', 'connected');
        } else {
          alert('启动失败：' + (result.msg || result.message || '未知错误'));
        }
      } catch (err) {
        alert('启动失败：' + err.message);
      }
    }

    async function startHTTPTest() {
      const params = {
        concurrency: document.getElementById('http_concurrency').value,
        duration: document.getElementById('http_duration').value,
        target_url: document.getElementById('http_target').value,
        method: document.getElementById('http_method').value
      };

      try {
        const res = await fetch('/admin/api/stress/start-http', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRF-Token': getCookie('csrf_token')
          },
          body: new URLSearchParams(params)
        });
        const result = await res.json();
        if (res.ok && result.code === 0) {
          isRunning = true;
          updateButtons();
          startUpdates();
          showStatus('mode', 'HTTP 压测中', 'connected');
        } else {
          alert('启动失败：' + (result.msg || result.message || '未知错误'));
        }
      } catch (err) {
        alert('启动失败：' + err.message);
      }
    }

    async function stopTest() {
      try {
        await fetch('/admin/api/stress/stop', {
          method: 'POST',
          headers: { 'X-CSRF-Token': getCookie('csrf_token') }
        });
        isRunning = false;
        updateButtons();
        stopUpdates();
        showStatus('mode', '已停止', 'disconnected');
      } catch (err) {
        console.error('停止失败:', err);
      }
    }

    async function clearData() {
      try {
        await fetch('/admin/api/stress/reset', {
          method: 'POST',
          headers: { 'X-CSRF-Token': getCookie('csrf_token') }
        });
        resetData();
      } catch (err) {
        console.error('清除失败:', err);
      }
    }

    function updateButtons() {
      document.getElementById('startBtn').disabled = isRunning;
      document.getElementById('stopBtn').disabled = !isRunning;
      document.getElementById('httpStartBtn').disabled = isRunning;
      document.getElementById('httpStopBtn').disabled = !isRunning;
    }

    function startUpdates() {
      if (updateTimer) clearInterval(updateTimer);
      updateTimer = setInterval(updateData, 1000);
    }

    function stopUpdates() {
      if (updateTimer) clearInterval(updateTimer);
      updateTimer = null;
    }

    async function updateData() {
      try {
        const res = await fetch('/admin/api/stress/stats');
        const result = await res.json();
        if (result.code === 0 && result.data) {
          const stats = result.data;
          updateMetrics(stats);
          updateCharts(stats);
          updateSystemMonitor(stats);
        }
      } catch (err) {
        console.error('更新数据失败:', err);
      }
    }

    function updateMetrics(stats) {
      document.getElementById('val-qps').textContent = Math.round(stats.qps || 0);
      document.getElementById('val-latency').textContent = (stats.latency || 0).toFixed(1);
      document.getElementById('val-p95').textContent = (stats.p95 || 0).toFixed(1);
      document.getElementById('val-p99').textContent = (stats.p99 || 0).toFixed(1);
      document.getElementById('val-workers').textContent = stats.workers || 0;
      document.getElementById('val-remaining').textContent = Math.max(0, (stats.remaining || 0)).toFixed(0);
      document.getElementById('val-total').textContent = Math.round(stats.total || 0);
    }

    function updateCharts(stats) {
      const now = new Date().toLocaleTimeString();
      if (data.time.length > MAX_POINTS) {
        data.time.shift();
        data.qps.shift();
        data.latency.shift();
        data.p95.shift();
        data.p99.shift();
        data.mysql.shift();
        data.redis.shift();
        data.mq.shift();
        data.cpu.shift();
        data.memUsed.shift();
        data.memTotal.shift();
        data.success.shift();
        data.failed.shift();
      }

      data.time.push(now);
      data.qps.push(stats.qps || 0);
      data.latency.push(stats.latency || 0);
      data.p95.push(stats.p95 || 0);
      data.p99.push(stats.p99 || 0);
      data.mysql.push(stats.mysqlOps || 0);
      data.redis.push(stats.redisOps || 0);
      data.mq.push(stats.mqOps || 0);
      data.cpu.push(stats.cpu || 0);
      data.memUsed.push((stats.memUsed / 1024 / 1024 / 1024).toFixed(2));
      data.memTotal.push((stats.memTotal / 1024 / 1024 / 1024).toFixed(2));
      data.success.push(stats.successRate || 0);
      data.failed.push(stats.failedRate || 0);

      charts.qps.setOption({ series: [{ data: data.qps }] });
      charts.latency.setOption({ series: [{ data: data.latency }, { data: data.p95 }, { data: data.p99 }] });
      charts.cpu.setOption({ series: [{ data: data.cpu }] });
      charts.memory.setOption({ series: [{ data: data.memUsed }, { data: data.memTotal }] });
      charts.middleware.setOption({ series: [{ data: data.mysql }, { data: data.redis }, { data: data.mq }] });
      charts.success.setOption({ series: [{ data: data.success }, { data: data.failed }] });
    }

    function updateSystemMonitor(stats) {
      const cpu = stats.cpu || 0;
      const memUsed = stats.memUsed || 0;
      const memTotal = stats.memTotal || 0;
      const net = stats.netSpeed || 0;

      document.getElementById('bar-cpu').style.width = cpu + '%';
      document.getElementById('val-cpu').textContent = cpu.toFixed(1) + '%';

      const memGB = (memUsed / 1024 / 1024 / 1024).toFixed(2);
      const totalGB = (memTotal / 1024 / 1024 / 1024).toFixed(2);
      const memPercent = memTotal > 0 ? (memUsed / memTotal * 100) : 0;

      document.getElementById('bar-mem').style.width = memPercent + '%';
      document.getElementById('val-mem').textContent = memGB + ' / ' + totalGB + ' GB';
      document.getElementById('val-net').textContent = (net / 1024).toFixed(1) + ' KB/s';
    }

    function showStatus(id, text, statusClass) {
      const el = document.getElementById('status-' + id);
      if (el) {
        el.querySelector('span').textContent = text;
        el.className = 'status-badge ' + statusClass;
      }
    }

    function resetData() {
      data = {
        time: [], qps: [], latency: [], p95: [], p99: [],
        mq: [], redis: [], mysql: [], http: [],
        success: [], failed: [],
        cpu: [], memUsed: [], memTotal: []
      };
      Object.values(charts).forEach(chart => {
        chart.clear();
      });
      initCharts();
      updateMetrics({});
    }

    function checkServices() {
      fetch('/admin/api/stress/services')
        .then(res => res.json())
        .then(result => {
          if (result.code === 0 && result.data) {
            const services = result.data;
            showStatus('db', services.mysql ? 'MySQL 正常' : 'MySQL 未连接', services.mysql ? 'connected' : 'disconnected');
            showStatus('redis', services.redis ? 'Redis 正常' : 'Redis 未连接', services.redis ? 'connected' : 'disconnected');
            showStatus('mq', services.mq ? 'MQ 正常' : 'MQ 未连接', services.mq ? 'connected' : 'disconnected');
          }
        })
        .catch(() => {
          showStatus('db', 'MySQL 检测失败', 'disconnected');
          showStatus('redis', 'Redis 检测失败', 'disconnected');
          showStatus('mq', 'MQ 检测失败', 'disconnected');
        });
    }

    window.onload = function () {
      initCharts();
      checkServices();
      updateButtons();
    };
  </script>
</body>

</html>
