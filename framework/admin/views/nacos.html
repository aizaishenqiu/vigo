<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <style>
        /* 深色主题 */
        :root {
            --bg: #020617;
            --card: #111827;
            --text: #f9fafb;
            --sub: #9ca3af;
            --blue: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --orange: #f59e0b;
            --purple: #8b5cf6;
            --border: #374151;
            --input: #1f2937;
        }

        /* 浅色主题 */
        [data-theme="light"] {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --sub: #64748b;
            --blue: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --orange: #f59e0b;
            --purple: #8b5cf6;
            --border: #e2e8f0;
            --input: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            padding: 15px 30px;
            border-radius: 12px;
        }

        .navbar h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar .links {
            display: flex;
            gap: 12px;
        }

        .navbar .links a {
            color: var(--sub);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 6px;
            transition: all .2s;
        }

        .navbar .links a:hover,
        .navbar .links a.active {
            background: var(--blue);
            color: #fff;
        }

        .status-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 200px;
            background: var(--card);
            padding: 16px 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--sub);
            margin-bottom: 6px;
        }

        .stat-card .value {
            font-size: 22px;
            font-weight: 700;
        }

        .stat-card .value.connected {
            color: var(--green);
        }

        .stat-card .value.disconnected {
            color: var(--red);
        }

        .panel {
            background: var(--card);
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
        }

        .panel-header h2 {
            font-size: 15px;
            font-weight: 600;
        }

        .panel-body {
            padding: 16px 20px;
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 10px 20px;
            font-size: 14px;
            color: var(--sub);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all .2s;
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--blue);
            border-bottom-color: var(--blue);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 10px 12px;
            color: var(--sub);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(51, 65, 85, .3);
        }

        tr:hover td {
            background: rgba(59, 130, 246, .05);
        }

        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: all .2s;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        .btn-blue {
            background: var(--blue);
            color: #fff;
        }

        .btn-green {
            background: var(--green);
            color: #fff;
        }

        .btn-red {
            background: var(--red);
            color: #fff;
        }

        .btn-purple {
            background: var(--purple);
            color: #fff;
        }

        .btn-orange {
            background: var(--orange);
            color: #fff;
        }

        .btn:hover {
            opacity: .85;
            transform: translateY(-1px);
        }

        .form-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        input,
        select,
        textarea {
            background: var(--input);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--blue);
        }

        textarea {
            resize: vertical;
            min-height: 200px;
            width: 100%;
            font-family: 'Fira Code', monospace, monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        label {
            font-size: 13px;
            color: var(--sub);
            min-width: 80px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-green {
            background: rgba(16, 185, 129, .15);
            color: var(--green);
        }

        .badge-red {
            background: rgba(239, 68, 68, .15);
            color: var(--red);
        }

        .badge-blue {
            background: rgba(59, 130, 246, .15);
            color: var(--blue);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 900px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            color: #fff;
            z-index: 9999;
            animation: fadeIn .3s;
        }

        .toast-success {
            background: var(--green);
        }

        .toast-error {
            background: var(--red);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ns-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .ns-tag {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            background: rgba(59, 130, 246, .1);
            color: var(--blue);
            border: 1px solid rgba(59, 130, 246, .3);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="navbar">
            <h1>Nacos 服务管理中心</h1>
            <div class="links">
                <a href="/" style="background: var(--blue); color: #fff;">返回首页</a>
                <a href="/admin/stress">压测中心</a>
                <a href="/admin/rabbitmq">RabbitMQ</a>
                <a href="/admin/nacos" class="active">Nacos</a>
                <a href="/admin/monitor">系统监控</a>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="stat-card">
                <div class="label">连接状态</div>
                <div class="value" id="conn-status">检测中...</div>
            </div>
            <div class="stat-card">
                <div class="label">服务器地址</div>
                <div class="value" id="server-addr" style="font-size:16px;">-</div>
            </div>
            <div class="stat-card">
                <div class="label">命名空间</div>
                <div class="value" id="namespace" style="font-size:14px;">-</div>
            </div>
            <div class="stat-card">
                <div class="label">默认配置</div>
                <div class="value" id="default-config" style="font-size:13px;color:var(--sub)">-</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="panel">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('config')">配置管理</div>
                <div class="tab" onclick="switchTab('services')">服务列表</div>
                <div class="tab" onclick="switchTab('register')">服务注册</div>
            </div>

            <!-- Config Tab -->
            <div id="tab-config" class="tab-content active">
                <div class="panel-body">
                    <div class="form-row">
                        <label>Data ID</label>
                        <input id="cfg-dataid" placeholder="配置 Data ID" style="width:250px">
                        <label>Group</label>
                        <input id="cfg-group" value="DEFAULT_GROUP" style="width:180px">
                        <button class="btn btn-blue" onclick="loadConfig()">获取配置</button>
                        <button class="btn btn-green" onclick="saveConfig()">保存配置</button>
                        <button class="btn btn-red btn-sm" onclick="deleteConfig()">删除</button>
                    </div>
                    <textarea id="cfg-content" placeholder="配置内容将显示在这里（支持 YAML / JSON / Properties）"></textarea>
                </div>
            </div>

            <!-- Services Tab -->
            <div id="tab-services" class="tab-content">
                <div class="panel-body">
                    <div class="form-row">
                        <button class="btn btn-blue" onclick="loadServices()">刷新服务列表</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>服务名称</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="service-list">
                            <tr>
                                <td colspan="2" style="color:var(--sub)">点击刷新加载...</td>
                            </tr>
                        </tbody>
                    </table>

                    <div id="instance-panel" style="margin-top: 16px; display: none;">
                        <h3 style="font-size: 14px; margin-bottom: 10px;">实例列表 - <span id="instance-service"
                                style="color:var(--blue)"></span></h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>IP</th>
                                    <th>端口</th>
                                    <th>健康</th>
                                    <th>权重</th>
                                    <th>元数据</th>
                                </tr>
                            </thead>
                            <tbody id="instance-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Register Tab -->
            <div id="tab-register" class="tab-content">
                <div class="panel-body">
                    <div class="form-row">
                        <label>服务名称</label>
                        <input id="reg-service" placeholder="如: vigo" style="width:250px">
                    </div>
                    <div class="form-row">
                        <label>实例 IP</label>
                        <input id="reg-ip" placeholder="127.0.0.1" value="127.0.0.1" style="width:200px">
                        <label>端口</label>
                        <input id="reg-port" placeholder="8080" value="8080" style="width:100px" type="number">
                    </div>
                    <div class="form-row">
                        <button class="btn btn-green" onclick="registerService()">注册实例</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Namespaces Panel -->
        <div class="panel" id="ns-panel" style="display:none">
            <div class="panel-header">
                <h2>命名空间</h2>
            </div>
            <div class="panel-body">
                <div class="ns-list" id="ns-list"></div>
            </div>
        </div>
    </div>

    <script>
        function initTheme() {
            const savedTheme = localStorage.getItem('vigo-theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
        }

        initTheme();

        function toast(msg, type = 'success') {
            const el = document.createElement('div');
            el.className = 'toast toast-' + type;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return '';
        }

        async function api(url, method = 'GET', body = null) {
            const opts = { method };
            opts.headers = opts.headers || {};
            opts.headers['X-CSRF-Token'] = getCookie('csrf_token');

            if (body) {
                opts.headers['Content-Type'] = 'application/x-www-form-urlencoded';
                opts.body = new URLSearchParams(body).toString();
            }
            const res = await fetch(url, opts);
            return res.json();
        }

        function switchTab(name) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                const tabs = ['config', 'services', 'register'];
                t.classList.toggle('active', tabs[i] === name);
            });
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
        }

        async function loadStatus() {
            try {
                const r = await api('/admin/api/nacos/status');
                const d = r.data;
                const el = document.getElementById('conn-status');
                if (d.connected) {
                    el.textContent = '已连接';
                    el.className = 'value connected';
                } else {
                    el.textContent = '未连接';
                    el.className = 'value disconnected';
                }
                if (d.config) {
                    document.getElementById('server-addr').textContent = d.config.host + ':' + d.config.port;
                    document.getElementById('namespace').textContent = d.config.namespace || 'public (默认)';
                    document.getElementById('default-config').textContent = d.config.data_id + ' / ' + d.config.group;
                    document.getElementById('cfg-dataid').value = d.config.data_id || '';
                    document.getElementById('cfg-group').value = d.config.group || 'DEFAULT_GROUP';
                }
                if (d.namespaces && d.namespaces.length > 0) {
                    document.getElementById('ns-panel').style.display = '';
                    document.getElementById('ns-list').innerHTML = d.namespaces.map(ns =>
                        `<span class="ns-tag">${ns.namespaceShowName || ns.namespace || ns.namespaceId || '-'}</span>`
                    ).join('');
                }
            } catch (e) {
                document.getElementById('conn-status').textContent = '请求失败';
                document.getElementById('conn-status').className = 'value disconnected';
            }
        }

        async function loadConfig() {
            const dataId = document.getElementById('cfg-dataid').value.trim();
            const group = document.getElementById('cfg-group').value.trim();
            if (!dataId) return toast('请输入 Data ID', 'error');

            const r = await api('/admin/api/nacos/config?data_id=' + encodeURIComponent(dataId) + '&group=' + encodeURIComponent(group));
            if (r.code === 0) {
                document.getElementById('cfg-content').value = r.data.content || '';
                toast('配置加载成功');
            } else {
                toast(r.msg || '加载失败', 'error');
            }
        }

        async function saveConfig() {
            const data_id = document.getElementById('cfg-dataid').value.trim();
            const group = document.getElementById('cfg-group').value.trim();
            const content = document.getElementById('cfg-content').value;
            if (!data_id || !content) return toast('Data ID 和内容不能为空', 'error');

            const r = await api('/admin/api/nacos/config/publish', 'POST', { data_id, group, content });
            if (r.code === 0) toast('配置保存成功');
            else toast(r.msg, 'error');
        }

        async function deleteConfig() {
            const data_id = document.getElementById('cfg-dataid').value.trim();
            const group = document.getElementById('cfg-group').value.trim();
            if (!data_id) return toast('请输入 Data ID', 'error');
            if (!confirm('确认删除配置 ' + data_id + ' ?')) return;

            const r = await api('/admin/api/nacos/config/delete', 'POST', { data_id, group });
            if (r.code === 0) { toast('配置已删除'); document.getElementById('cfg-content').value = ''; }
            else toast(r.msg, 'error');
        }

        async function loadServices() {
            const r = await api('/admin/api/nacos/services');
            const tbody = document.getElementById('service-list');
            if (r.code !== 0 || !r.data) {
                tbody.innerHTML = '<tr><td colspan="2" style="color:var(--red)">' + (r.msg || '加载失败') + '</td></tr>';
                return;
            }
            const doms = r.data.doms || r.data.services || [];
            if (doms.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" style="color:var(--sub)">暂无注册服务</td></tr>';
                return;
            }
            tbody.innerHTML = doms.map(s => {
                const name = typeof s === 'string' ? s : s.name;
                return `<tr>
                <td><strong>${name}</strong></td>
                <td><button class="btn btn-blue btn-sm" onclick="viewInstances('${name}')">查看实例</button></td>
            </tr>`;
            }).join('');
        }

        async function viewInstances(serviceName) {
            document.getElementById('instance-panel').style.display = '';
            document.getElementById('instance-service').textContent = serviceName;

            const r = await api('/admin/api/nacos/instances?service=' + encodeURIComponent(serviceName));
            const tbody = document.getElementById('instance-list');
            if (r.code !== 0 || !r.data) {
                tbody.innerHTML = '<tr><td colspan="5" style="color:var(--red)">' + (r.msg || '获取失败') + '</td></tr>';
                return;
            }
            const hosts = r.data.hosts || [];
            if (hosts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="color:var(--sub)">无实例</td></tr>';
                return;
            }
            tbody.innerHTML = hosts.map(h => `<tr>
            <td>${h.ip}</td>
            <td>${h.port}</td>
            <td><span class="badge ${h.healthy ? 'badge-green' : 'badge-red'}">${h.healthy ? '健康' : '不健康'}</span></td>
            <td>${h.weight || 1}</td>
            <td style="font-size:11px;color:var(--sub)">${JSON.stringify(h.metadata || {})}</td>
        </tr>`).join('');
        }

        async function registerService() {
            const service = document.getElementById('reg-service').value.trim();
            const ip = document.getElementById('reg-ip').value.trim();
            const port = document.getElementById('reg-port').value.trim();
            if (!service || !ip || !port) return toast('请填写完整信息', 'error');

            const r = await api('/admin/api/nacos/service/register', 'POST', { service, ip, port });
            if (r.code === 0) toast('服务实例注册成功');
            else toast(r.msg, 'error');
        }

        // 初始化
        loadStatus();
        setInterval(loadStatus, 15000);
    </script>
</body>

</html>
