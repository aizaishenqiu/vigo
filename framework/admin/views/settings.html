<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>{{.title}}</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/admin/static/layui/css/layui.css" media="all">
    <style>
        body {
            padding: 20px;
            background-color: #f2f2f2;
        }

        .layui-card {
            border-radius: 4px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, .05);
        }

        .layui-card-header {
            font-weight: 600;
        }

        .section-body {
            background: #fff;
            padding: 20px 20px 5px;
        }

        .config-section {
            display: none;
        }

        .config-section.active {
            display: block;
        }

        .layui-form-item .layui-input-inline {
            width: 340px;
        }
    </style>
</head>

<body>
    <div class="layui-card">
        <div class="layui-card-header" id="sectionTitle">配置</div>
        <div class="section-body">
            <div id="sec-app" class="config-section">
                <form class="layui-form">
                    <div class="layui-form-item"><label class="layui-form-label">应用名称</label>
                        <div class="layui-input-inline"><input id="app-name" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">端口</label>
                        <div class="layui-input-inline"><input id="app-port" type="number" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">运行模式</label>
                        <div class="layui-input-inline"><select id="app-mode">
                                <option value="dev">开发环境</option>
                                <option value="test">测试环境</option>
                                <option value="prod">生产环境</option>
                            </select></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">调试模式</label>
                        <div class="layui-input-inline"><input id="app-debug" type="checkbox" lay-skin="switch"
                                lay-text="开启|关闭"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">控制台输出</label>
                        <div class="layui-input-inline"><input id="app-console" type="checkbox" lay-skin="switch"
                                lay-text="开启|关闭"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">自动释放端口</label>
                        <div class="layui-input-inline"><input id="app-auto-kill-port" type="checkbox" lay-skin="switch"
                                lay-text="开启|关闭"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">调试工具栏</label>
                        <div class="layui-input-inline"><input id="app-debug-toolbar" type="checkbox" lay-skin="switch"
                                lay-text="开启|关闭"></div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-input-block"><button type="button" class="layui-btn"
                                id="btn-save-app">保存应用配置</button></div>
                    </div>
                </form>
            </div>

            <div id="sec-admin" class="config-section">
                <form class="layui-form">
                    <div class="layui-form-item"><label class="layui-form-label">原密码</label>
                        <div class="layui-input-inline"><input id="admin-old-password" type="password"
                                class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">新密码</label>
                        <div class="layui-input-inline"><input id="admin-new-password" type="password"
                                class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">确认密码</label>
                        <div class="layui-input-inline"><input id="admin-confirm-password" type="password"
                                class="layui-input"></div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-input-block"><button type="button" class="layui-btn"
                                id="btn-save-admin">修改密码</button></div>
                    </div>
                </form>
            </div>

            <div id="sec-database" class="config-section">
                <div style="margin-bottom: 12px;">
                    <button class="layui-btn layui-btn-sm" id="btn-add-db"><i class="layui-icon">&#xe654;</i>
                        添加数据库</button>
                </div>
                <table id="db-table" lay-filter="db-table"></table>
            </div>

            <div id="sec-redis" class="config-section">
                <form class="layui-form">
                    <div class="layui-form-item"><label class="layui-form-label">Host</label>
                        <div class="layui-input-inline"><input id="redis-host" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">Port</label>
                        <div class="layui-input-inline"><input id="redis-port" type="number" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">Password</label>
                        <div class="layui-input-inline"><input id="redis-password" type="password" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">DB</label>
                        <div class="layui-input-inline"><input id="redis-db" type="number" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">PoolSize</label>
                        <div class="layui-input-inline"><input id="redis-pool-size" type="number" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">MinIdleConns</label>
                        <div class="layui-input-inline"><input id="redis-min-idle-conns" type="number"
                                class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">MaxIdleConns</label>
                        <div class="layui-input-inline"><input id="redis-max-idle-conns" type="number"
                                class="layui-input"></div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-input-block"><button type="button" class="layui-btn"
                                id="btn-save-redis">保存Redis配置</button></div>
                    </div>
                </form>
            </div>

            <div id="sec-rabbitmq" class="config-section">
                <form class="layui-form">
                    <div class="layui-form-item"><label class="layui-form-label">启用</label>
                        <div class="layui-input-inline"><input id="mq-enabled" type="checkbox" lay-skin="switch"
                                lay-text="开启|关闭"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">Host</label>
                        <div class="layui-input-inline"><input id="mq-host" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">Port</label>
                        <div class="layui-input-inline"><input id="mq-port" type="number" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">User</label>
                        <div class="layui-input-inline"><input id="mq-user" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">Pass</label>
                        <div class="layui-input-inline"><input id="mq-pass" type="password" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">VHost</label>
                        <div class="layui-input-inline"><input id="mq-vhost" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">ConnTimeout</label>
                        <div class="layui-input-inline"><input id="mq-timeout" type="number" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">Heartbeat</label>
                        <div class="layui-input-inline"><input id="mq-heartbeat" type="number" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-input-block"><button type="button" class="layui-btn"
                                id="btn-save-rabbitmq">保存RabbitMQ配置</button></div>
                    </div>
                </form>
            </div>

            <div id="sec-nacos" class="config-section">
                <form class="layui-form">
                    <div class="layui-form-item"><label class="layui-form-label">启用</label>
                        <div class="layui-input-inline"><input id="nacos-enabled" type="checkbox" lay-skin="switch"
                                lay-text="开启|关闭"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">IP</label>
                        <div class="layui-input-inline"><input id="nacos-ip" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">Port</label>
                        <div class="layui-input-inline"><input id="nacos-port" type="number" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">Namespace</label>
                        <div class="layui-input-inline"><input id="nacos-namespace" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">DataId</label>
                        <div class="layui-input-inline"><input id="nacos-data-id" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">Group</label>
                        <div class="layui-input-inline"><input id="nacos-group" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-input-block"><button type="button" class="layui-btn"
                                id="btn-save-nacos">保存Nacos配置</button></div>
                    </div>
                </form>
            </div>

            <div id="sec-grpc" class="config-section">
                <form class="layui-form">
                    <div class="layui-form-item"><label class="layui-form-label">启用</label>
                        <div class="layui-input-inline"><input id="grpc-enabled" type="checkbox" lay-skin="switch"
                                lay-text="开启|关闭"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">端口</label>
                        <div class="layui-input-inline"><input id="grpc-port" type="number" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">服务名</label>
                        <div class="layui-input-inline"><input id="grpc-service-name" class="layui-input"></div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-input-block"><button type="button" class="layui-btn"
                                id="btn-save-grpc">保存gRPC配置</button></div>
                    </div>
                </form>
            </div>

            <div id="sec-security" class="config-section">
                <form class="layui-form">
                    <div class="layui-form-item"><label class="layui-form-label">安全中间件</label>
                        <div class="layui-input-inline"><input id="sec-enable-security-middleware" type="checkbox"
                                lay-skin="switch" lay-text="开启|关闭"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">CSRF保护</label>
                        <div class="layui-input-inline"><input id="sec-enable-csrf-protection" type="checkbox"
                                lay-skin="switch" lay-text="开启|关闭"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">速率限制</label>
                        <div class="layui-input-inline"><input id="sec-enable-rate-limit" type="checkbox"
                                lay-skin="switch" lay-text="开启|关闭"></div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">每秒限制</label>
                        <div class="layui-input-inline"><input id="sec-rate-limit" type="number" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">CORS域名校验</label>
                        <div class="layui-input-inline"><input id="sec-enable-cors-domain-check" type="checkbox"
                                lay-skin="switch" lay-text="开启|关闭"></div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-input-block"><button type="button" class="layui-btn"
                                id="btn-save-security">保存安全配置</button></div>
                    </div>
                </form>
            </div>

            <div id="sec-payment" class="config-section">
                <fieldset class="layui-elem-field">
                    <legend>支付宝</legend>
                    <div class="layui-field-box">
                        <div class="layui-form-item"><label class="layui-form-label">启用</label>
                            <div class="layui-input-inline"><input id="pay-alipay-enabled" type="checkbox"
                                    lay-skin="switch" lay-text="开启|关闭"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">AppID</label>
                            <div class="layui-input-inline"><input id="pay-alipay-app-id" class="layui-input"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">私钥</label>
                            <div class="layui-input-inline"><textarea id="pay-alipay-private-key"
                                    class="layui-textarea"></textarea></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">公钥</label>
                            <div class="layui-input-inline"><textarea id="pay-alipay-public-key"
                                    class="layui-textarea"></textarea></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">回调地址</label>
                            <div class="layui-input-inline"><input id="pay-alipay-notify-url" class="layui-input"
                                    placeholder="notify_url"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">返回地址</label>
                            <div class="layui-input-inline"><input id="pay-alipay-return-url" class="layui-input"
                                    placeholder="return_url"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">服务商</label>
                            <div class="layui-input-inline"><input id="pay-alipay-is-provider" type="checkbox"
                                    lay-skin="switch" lay-text="是|否"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">服务商PID</label>
                            <div class="layui-input-inline"><input id="pay-alipay-provider-pid" class="layui-input"
                                    placeholder="provider_pid"></div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-input-block"><button type="button" class="layui-btn layui-btn-sm"
                                    id="btn-save-alipay">保存支付宝配置</button></div>
                        </div>
                    </div>
                </fieldset>
                <fieldset class="layui-elem-field">
                    <legend>微信支付</legend>
                    <div class="layui-field-box">
                        <div class="layui-form-item"><label class="layui-form-label">启用</label>
                            <div class="layui-input-inline"><input id="pay-wechat-enabled" type="checkbox"
                                    lay-skin="switch" lay-text="开启|关闭"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">商户号</label>
                            <div class="layui-input-inline"><input id="pay-wechat-mch-id" class="layui-input"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">API密钥</label>
                            <div class="layui-input-inline"><input id="pay-wechat-api-key" class="layui-input"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">AppID</label>
                            <div class="layui-input-inline"><input id="pay-wechat-app-id" class="layui-input"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">回调地址</label>
                            <div class="layui-input-inline"><input id="pay-wechat-notify-url" class="layui-input"
                                    placeholder="notify_url"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">服务商</label>
                            <div class="layui-input-inline"><input id="pay-wechat-is-provider" type="checkbox"
                                    lay-skin="switch" lay-text="是|否"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">服务商商户号</label>
                            <div class="layui-input-inline"><input id="pay-wechat-provider-mch-id" class="layui-input"
                                    placeholder="provider_mch_id"></div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-input-block"><button type="button" class="layui-btn layui-btn-sm"
                                    id="btn-save-wechat-pay">保存微信支付配置</button></div>
                        </div>
                    </div>
                </fieldset>
            </div>

            <div id="sec-oauth" class="config-section">
                <fieldset class="layui-elem-field">
                    <legend>QQ登录</legend>
                    <div class="layui-field-box">
                        <div class="layui-form-item"><label class="layui-form-label">启用</label>
                            <div class="layui-input-inline"><input id="oauth-qq-enabled" type="checkbox"
                                    lay-skin="switch" lay-text="开启|关闭"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">AppID</label>
                            <div class="layui-input-inline"><input id="oauth-qq-app-id" class="layui-input"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">AppKey</label>
                            <div class="layui-input-inline"><input id="oauth-qq-app-key" class="layui-input"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">回调地址</label>
                            <div class="layui-input-inline"><input id="oauth-qq-redirect-uri" class="layui-input"
                                    placeholder="redirect_uri"></div>
                        </div>
                        <div class="layui-form-item">

                        </div>
                    </div>
                </fieldset>
                <fieldset class="layui-elem-field">
                    <legend>微信登录</legend>
                    <div class="layui-field-box">
                        <div class="layui-form-item"><label class="layui-form-label">启用</label>
                            <div class="layui-input-inline"><input id="oauth-wechat-enabled" type="checkbox"

                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">AppID</label>
                            <div class="layui-input-inline"><input id="oauth-wechat-app-id" class="layui-input"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">AppSecret</label>
                            <div class="layui-input-inline"><input id="oauth-wechat-app-secret" class="layui-input">

                            <div class="layui-input-block"><button type="button" class="layui-btn layui-btn-sm"

                </fieldset>
                <fieldset class="layui-elem-field">
                    <legend>支付宝登录</legend>
                    <div class="layui-field-box">
                        <div class="layui-form-item"><label class="layui-form-label">启用</label>
                            <div class="layui-input-inline"><input id="oauth-alipay-enabled" type="checkbox"
                                    lay-skin="switch" lay-text="开启|关闭"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">AppID</label>
                            <div class="layui-input-inline"><input id="oauth-alipay-app-id" class="layui-input"></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">私钥</label>
                            <div class="layui-input-inline"><textarea id="oauth-alipay-private-key"
                                    class="layui-textarea"></textarea></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">公钥</label>
                            <div class="layui-input-inline"><textarea id="oauth-alipay-public-key"
                                    class="layui-textarea"></textarea></div>
                        </div>
                        <div class="layui-form-item"><label class="layui-form-label">回调地址</label>

                        </div>
                    </div>

            <div id="sec-benchmark" class="config-section">
                <form class="layui-form">
                    <div class="layui-form-item"><label class="layui-form-label">内存限制(%)</label>
                        <div class="layui-input-inline"><input id="benchmark-mem" type="number" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item"><label class="layui-form-label">CPU限制(%)</label>
                        <div class="layui-input-inline"><input id="benchmark-cpu" type="number" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-input-block"><button type="button" class="layui-btn"
                                id="btn-save-benchmark">保存压测配置</button></div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/admin/static/layui/layui.js"></script>
    <script>
        layui.use(['form', 'table', 'layer'], function () {
            var form = layui.form;
            var table = layui.table;
            var layer = layui.layer;
            var $ = layui.$;
            var cfg = {};
            var currentTab = new URLSearchParams(window.location.search).get('tab') || 'app';
            var titleMap = {
                app: '应用配置', admin: '管理员设置', database: '数据库配置', redis: 'Redis配置',
                rabbitmq: 'RabbitMQ配置', nacos: 'Nacos配置', grpc: 'gRPC配置', security: '安全配置',
                payment: '支付配置', oauth: '第三方登录配置', benchmark: '压测配置'
            };

            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
                return '';
            }

            function api(url, data, method) {
                return fetch(url, {
                    method: method || 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': getCookie('csrf_token') },
                    body: JSON.stringify(data || {})
                }).then(function (res) { return res.json(); });
            }

            function showSection(tab) {
                $('.config-section').removeClass('active');
                $('#sec-' + tab).addClass('active');
                $('#sectionTitle').text(titleMap[tab] || '配置');
                if (tab === 'database') renderDbTable();
            }

            function setVal(id, value) {

            function driverSelect(current) {
                var value = current || 'mysql';
                var drivers = ['mysql', 'postgres', 'sqlite3', 'mssql'];
                var options = drivers.map(function (item) {
                    return '<option value="' + item + '"' + (item === value ? ' selected' : '') + '>' + item + '</option>';
                }).join('');
                if (drivers.indexOf(value) < 0) {
                    options = '<option value="' + value + '" selected>' + value + '</option>' + options;
                }
                return '<select id="db-driver">' + options + '</select>';
            }

            function charsetListByDriver(driver) {
                if (driver === 'postgres') return ['UTF8', 'LATIN1', 'SQL_ASCII'];
                if (driver === 'sqlite3') return ['UTF-8', 'UTF-16le', 'UTF-16be'];
                if (driver === 'mssql') return ['Chinese_PRC_CI_AS', 'Latin1_General_CI_AS', 'SQL_Latin1_General_CP1_CI_AS'];
                return ['utf8mb4', 'utf8', 'latin1', 'gbk', 'gb2312', 'utf16'];
            }

            function charsetSelect(current, driver) {
                var value = current || 'utf8mb4';
                var list = charsetListByDriver(driver || 'mysql');
                var options = list.map(function (item) {
                    return '<option value="' + item + '"' + (item === value ? ' selected' : '') + '>' + item + '</option>';
                }).join('');
                if (list.indexOf(value) < 0) {
                    options = '<option value="' + value + '" selected>' + value + '</option>' + options;
                }
                return '<select id="db-charset">' + options + '</select>';
            }

            });
        });
    </script>
