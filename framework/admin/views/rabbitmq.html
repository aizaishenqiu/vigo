<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <style>
        /* 深色主题 */
        :root {
            --bg: #020617;
            --card: #111827;
            --text: #f9fafb;
            --sub: #9ca3af;
            --blue: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --orange: #f59e0b;
            --purple: #8b5cf6;
            --border: #374151;
            --input: #1f2937;
        }

        /* 浅色主题 */
        [data-theme="light"] {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --sub: #64748b;
            --blue: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --orange: #f59e0b;
            --purple: #8b5cf6;
            --border: #e2e8f0;
            --input: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            padding: 15px 30px;
            border-radius: 12px;
        }

        .navbar h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar .links {
            display: flex;
            gap: 12px;
        }

        .navbar .links a {
            color: var(--sub);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 6px;
            transition: all .2s;
        }

        .navbar .links a:hover,
        .navbar .links a.active {
            background: var(--blue);
            color: #fff;
        }

        .status-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 200px;
            background: var(--card);
            padding: 16px 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--sub);
            margin-bottom: 6px;
        }

        .stat-card .value {
            font-size: 22px;
            font-weight: 700;
        }

        .stat-card .value.connected {
            color: var(--green);
        }

        .stat-card .value.disconnected {
            color: var(--red);
        }

        .panel {
            background: var(--card);
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
        }

        .panel-header h2 {
            font-size: 15px;
            font-weight: 600;
        }

        .panel-body {
            padding: 16px 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 10px 12px;
            color: var(--sub);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(51, 65, 85, .3);
        }

        tr:hover td {
            background: rgba(59, 130, 246, .05);
        }

        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: all .2s;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        .btn-blue {
            background: var(--blue);
            color: #fff;
        }

        .btn-green {
            background: var(--green);
            color: #fff;
        }

        .btn-red {
            background: var(--red);
            color: #fff;
        }

        .btn-purple {
            background: var(--purple);
            color: #fff;
        }

        .btn-orange {
            background: var(--orange);
            color: #fff;
        }

        .btn:hover {
            opacity: .85;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none;
        }

        .form-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .form-row:last-child {
            margin-bottom: 0;
        }

        input,
        select,
        textarea {
            background: var(--input);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--blue);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            width: 100%;
            font-family: monospace;
        }

        label {
            font-size: 13px;
            color: var(--sub);
            min-width: 70px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-green {
            background: rgba(16, 185, 129, .15);
            color: var(--green);
        }

        .badge-red {
            background: rgba(239, 68, 68, .15);
            color: var(--red);
        }

        .badge-blue {
            background: rgba(59, 130, 246, .15);
            color: var(--blue);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 900px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            color: #fff;
            z-index: 9999;
            animation: fadeIn .3s;
        }

        .toast-success {
            background: var(--green);
        }

        .toast-error {
            background: var(--red);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="navbar">
            <h1>RabbitMQ 管理中心</h1>
            <div class="links">
                <a href="/" style="background: var(--blue); color: #fff;">返回首页</a>
                <a href="/admin/stress">压测中心</a>
                <a href="/admin/rabbitmq" class="active">RabbitMQ</a>
                <a href="/admin/nacos">Nacos</a>
                <a href="/admin/monitor">系统监控</a>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="stat-card">
                <div class="label">连接状态</div>
                <div class="value" id="conn-status">检测中...</div>
            </div>
            <div class="stat-card">
                <div class="label">RabbitMQ 版本</div>
                <div class="value" id="mq-version" style="font-size:16px;">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Erlang 版本</div>
                <div class="value" id="erlang-version" style="font-size:16px;">-</div>
            </div>
            <div class="stat-card">
                <div class="label">队列数 / 交换机数</div>
                <div class="value" id="totals" style="font-size:16px;">- / -</div>
            </div>
            <div class="stat-card">
                <div class="label">连接信息</div>
                <div class="value" id="conn-info" style="font-size:13px;color:var(--sub)">-</div>
            </div>
        </div>

        <div class="grid-2">
            <!-- Queues Panel -->
            <div class="panel">
                <div class="panel-header">
                    <h2>队列管理</h2>
                    <button class="btn btn-blue btn-sm" onclick="loadQueues()">刷新</button>
                </div>
                <div class="panel-body">
                    <div class="form-row">
                        <input id="new-queue" placeholder="队列名称" style="flex:1">
                        <label style="min-width:auto"><input type="checkbox" id="queue-durable" checked> 持久化</label>
                        <button class="btn btn-green btn-sm" onclick="createQueue()">创建</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>名称</th>
                                <th>消息数</th>
                                <th>消费者</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="queue-list">
                            <tr>
                                <td colspan="5" style="color:var(--sub)">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Exchanges Panel -->
            <div class="panel">
                <div class="panel-header">
                    <h2>交换机管理</h2>
                    <button class="btn btn-blue btn-sm" onclick="loadExchanges()">刷新</button>
                </div>
                <div class="panel-body">
                    <div class="form-row">
                        <input id="new-exchange" placeholder="交换机名称" style="flex:1">
                        <select id="exchange-type">
                            <option value="direct">direct</option>
                            <option value="fanout">fanout</option>
                            <option value="topic">topic</option>
                            <option value="headers">headers</option>
                        </select>
                        <label style="min-width:auto"><input type="checkbox" id="exchange-durable" checked> 持久化</label>
                        <button class="btn btn-green btn-sm" onclick="createExchange()">创建</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>名称</th>
                                <th>类型</th>
                                <th>持久化</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="exchange-list">
                            <tr>
                                <td colspan="4" style="color:var(--sub)">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Publish Panel -->
        <div class="panel">
            <div class="panel-header">
                <h2>消息发布测试</h2>
            </div>
            <div class="panel-body">
                <div class="form-row">
                    <label>目标队列</label>
                    <input id="pub-queue" placeholder="直接发到队列（留空走交换机）" style="width:200px">
                    <label>交换机</label>
                    <input id="pub-exchange" placeholder="exchange 名称" style="width:160px">
                    <label>Routing Key</label>
                    <input id="pub-rk" placeholder="routing key" style="width:160px">
                </div>
                <div class="form-row">
                    <textarea id="pub-message" placeholder="消息内容（JSON 或纯文本）">{"test": "hello from vigo"}</textarea>
                </div>
                <div class="form-row">
                    <button class="btn btn-purple" onclick="publishMessage()">发送消息</button>
                    <span id="pub-result" style="font-size:13px;color:var(--green)"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function initTheme() {
            const savedTheme = localStorage.getItem('vigo-theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
        }

        initTheme();

        function toast(msg, type = 'success') {
            const el = document.createElement('div');
            el.className = 'toast toast-' + type;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return '';
        }

        async function api(url, method = 'GET', body = null) {
            const opts = { method };
            opts.headers = opts.headers || {};
            opts.headers['X-CSRF-Token'] = getCookie('csrf_token');

            if (body) {
                opts.headers['Content-Type'] = 'application/json';
                opts.body = JSON.stringify(body);
            }
            const res = await fetch(url, opts);
            return res.json();
        }

        async function loadStatus() {
            try {
                const r = await api('/admin/api/rabbitmq/status');
                const d = r.data;
                const el = document.getElementById('conn-status');
                if (d && d.connected) {
                    el.textContent = '已连接';
                    el.className = 'value connected';
                } else {
                    el.textContent = '未连接';
                    el.className = 'value disconnected';
                }
                if (d) {
                    document.getElementById('mq-version').textContent = d.version || '-';
                    document.getElementById('erlang-version').textContent = d.erlang_version || '-';
                    if (d.totals) {
                        document.getElementById('totals').textContent =
                            (d.totals.queues || 0) + ' / ' + (d.totals.exchanges || 0);
                    }
                    if (d.config) {
                        document.getElementById('conn-info').textContent =
                            d.config.user + '@' + d.config.host + ':' + d.config.port + d.config.vhost;
                    }
                }
            } catch (e) {
                document.getElementById('conn-status').textContent = '请求失败';
                document.getElementById('conn-status').className = 'value disconnected';
            }
        }

        async function loadQueues() {
            try {
                const r = await api('/admin/api/rabbitmq/queues');
                const tbody = document.getElementById('queue-list');
                if (!r.data || r.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="color:var(--sub)">暂无队列</td></tr>';
                    return;
                }
                tbody.innerHTML = r.data.map(q => `<tr>
                <td><strong>${q.name}</strong></td>
                <td>${q.messages ?? '-'}</td>
                <td>${q.consumers ?? '-'}</td>
                <td><span class="badge ${q.state === 'running' ? 'badge-green' : 'badge-blue'}">${q.state || 'idle'}</span></td>
                <td>
                    <button class="btn btn-orange btn-sm" onclick="purgeQueue('${q.name}')">清空</button>
                    <button class="btn btn-red btn-sm" onclick="deleteQueue('${q.name}')">删除</button>
                </td>
            </tr>`).join('');
            } catch (e) {
                document.getElementById('queue-list').innerHTML = '<tr><td colspan="5" style="color:var(--red)">' + (e.message || '加载失败') + '</td></tr>';
            }
        }

        async function loadExchanges() {
            try {
                const r = await api('/admin/api/rabbitmq/exchanges');
                const tbody = document.getElementById('exchange-list');
                if (!r.data || r.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="color:var(--sub)">暂无交换机</td></tr>';
                    return;
                }
                tbody.innerHTML = r.data.filter(e => e.name !== '').map(e => `<tr>
                <td><strong>${e.name || '(默认)'}</strong></td>
                <td><span class="badge badge-blue">${e.type}</span></td>
                <td>${e.durable ? '是' : '否'}</td>
                <td>${e.name ? `<button class="btn btn-red btn-sm" onclick="deleteExchange('${e.name}')">删除</button>` : '-'}</td>
            </tr>`).join('');
            } catch (e) {
                document.getElementById('exchange-list').innerHTML = '<tr><td colspan="4" style="color:var(--red)">' + (e.message || '加载失败') + '</td></tr>';
            }
        }

        async function createQueue() {
            const name = document.getElementById('new-queue').value.trim();
            if (!name) return toast('请输入队列名称', 'error');
            const durable = document.getElementById('queue-durable').checked;
            const r = await api('/admin/rabbitmq/queue', 'POST', { name, durable });
            if (r.code === 0) { toast('队列创建成功'); loadQueues(); loadStatus(); document.getElementById('new-queue').value = ''; }
            else toast(r.msg || '创建失败', 'error');
        }

        async function deleteQueue(name) {
            if (!confirm('确认删除队列 ' + name + ' ?')) return;
            const r = await api('/admin/rabbitmq/queue', 'DELETE', { name });
            if (r.code === 0) { toast('已删除'); loadQueues(); loadStatus(); }
            else toast(r.msg, 'error');
        }

        async function purgeQueue(name) {
            // Not implemented in backend yet, just show toast
            toast('清空队列功能暂未开放', 'error');
        }

        async function createExchange() {
            const name = document.getElementById('new-exchange').value.trim();
            if (!name) return toast('请输入交换机名称', 'error');
            const type = document.getElementById('exchange-type').value;
            const durable = document.getElementById('exchange-durable').checked;
            const r = await api('/admin/rabbitmq/exchange', 'POST', { name, type, durable });
            if (r.code === 0) { toast('交换机创建成功'); loadExchanges(); loadStatus(); document.getElementById('new-exchange').value = ''; }
            else toast(r.msg, 'error');
        }

        async function deleteExchange(name) {
            if (!confirm('确认删除交换机 ' + name + ' ?')) return;
            const r = await api('/admin/rabbitmq/exchange', 'DELETE', { name });
            if (r.code === 0) { toast('已删除'); loadExchanges(); loadStatus(); }
            else toast(r.msg, 'error');
        }

        async function publishMessage() {
            const queue = document.getElementById('pub-queue').value.trim();
            const exchange = document.getElementById('pub-exchange').value.trim();
            const routing_key = document.getElementById('pub-rk').value.trim();
            const message = document.getElementById('pub-message').value.trim();
            if (!message) return toast('消息内容不能为空', 'error');
            if (!queue && !exchange) return toast('请填写目标队列或交换机', 'error');

            // Not implemented in backend yet
            toast('消息发送功能暂未开放', 'error');
        }

        // 初始化
        loadStatus();
        loadQueues();
        loadExchanges();
        setInterval(loadStatus, 10000);
    </script>
</body>

</html>
