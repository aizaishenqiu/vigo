<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacos 管理 - Vigo</title>
    <style>
        /* 深色主题 */
        :root { --bg:#020617; --card:#111827; --text:#f9fafb; --sub:#9ca3af; --blue:#3b82f6; --green:#10b981; --red:#ef4444; --orange:#f59e0b; --border:#374151; }
        
        /* 浅色主题 */
        [data-theme="light"] { --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --sub:#64748b; --blue:#3b82f6; --green:#10b981; --red:#ef4444; --orange:#f59e0b; --border:#e2e8f0; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #0ea5e9, #06b6d4); padding: 20px 30px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; color: #fff; }
        .header .logo { display: flex; align-items: center; gap: 10px; }
        .header .logo svg { width: 40px; height: 40px; }
        .status-badge { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px; font-size: 14px; }
        .status-badge.connected { background: #10b981; }
        .status-badge.disconnected { background: #ef4444; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: #16213e; border-radius: 12px; padding: 20px; border: 1px solid #0f3460; }
        .card h3 { color: #0ea5e9; margin-bottom: 15px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .card h3 svg { width: 20px; height: 20px; }
        .stat { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #0f3460; }
        .stat:last-child { border-bottom: none; }
        .stat-label { color: #888; }
        .stat-value { font-weight: 600; color: #fff; }
        .stat-value.success { color: #10b981; }
        .stat-value.warning { color: #f59e0b; }
        .stat-value.danger { color: #ef4444; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { background: #16213e; border: 1px solid #0f3460; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .tab:hover, .tab.active { background: #0ea5e9; border-color: #0ea5e9; }
        .table-container { background: #16213e; border-radius: 12px; overflow: hidden; border: 1px solid #0f3460; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #0f3460; }
        th { background: #0f3460; color: #0ea5e9; font-weight: 600; }
        tr:hover { background: rgba(14,165,233,0.1); }
        .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .btn-primary { background: #0ea5e9; color: #fff; }
        .btn-primary:hover { background: #0284c7; }
        .info-box { background: #0f3460; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .info-box h4 { color: #0ea5e9; margin-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; padding: 5px 0; }
        .refresh-btn { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background: #0ea5e9; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(14,165,233,0.4); transition: transform 0.3s; }
        .refresh-btn:hover { transform: scale(1.1); }
        .refresh-btn svg { width: 24px; height: 24px; fill: #fff; }
        .empty-state { text-align: center; padding: 40px; color: #666; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .tag-healthy { background: #10b981; color: #fff; }
        .tag-unhealthy { background: #ef4444; color: #fff; }
        .config-editor { background: #0f3460; border-radius: 8px; padding: 15px; margin-top: 15px; }
        .config-editor textarea { width: 100%; height: 200px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; color: #eee; padding: 10px; font-family: 'Monaco', 'Menlo', monospace; font-size: 13px; resize: vertical; }
        .config-editor .btn-row { margin-top: 10px; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="white">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                <h1>Nacos 管理</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <a href="/" style="background: rgba(255,255,255,0.2); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 500;">返回首页</a>
                <div class="status-badge connected">已连接</div>
            </div>
        </div>

        <div class="info-box">
            <h4>服务信息</h4>
            <div class="info-row"><span>服务地址:</span><span>{{.host}}:{{.port}}</span></div>
            <div class="info-row"><span>命名空间:</span><span>{{if .namespace}}{{.namespace}}{{else}}public{{end}}</span></div>
            <div class="info-row"><span>Data ID:</span><span>{{.data_id}}</span></div>
            <div class="info-row"><span>Group:</span><span>{{.group}}</span></div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>
                    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    服务统计
                </h3>
                <div class="stat"><span class="stat-label">注册服务</span><span class="stat-value" id="service-count">-</span></div>
                <div class="stat"><span class="stat-label">健康实例</span><span class="stat-value success" id="healthy-count">-</span></div>
                <div class="stat"><span class="stat-label">异常实例</span><span class="stat-value" id="unhealthy-count">-</span></div>
            </div>
            <div class="card">
                <h3>
                    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-4H6v-2h4V7h2v4h4v2h-4v4z"/></svg>
                    配置统计
                </h3>
                <div class="stat"><span class="stat-label">配置数</span><span class="stat-value" id="config-count">-</span></div>
                <div class="stat"><span class="stat-label">监听数</span><span class="stat-value" id="listener-count">-</span></div>
            </div>
            <div class="card">
                <h3>
                    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    集群状态
                </h3>
                <div class="stat"><span class="stat-label">节点数</span><span class="stat-value">1</span></div>
                <div class="stat"><span class="stat-label">Leader</span><span class="stat-value success">正常</span></div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="services">服务列表</div>
            <div class="tab" data-tab="configs">配置管理</div>
            <div class="tab" data-tab="instances">实例详情</div>
        </div>

        <div class="table-container">
            <table id="services-table">
                <thead>
                    <tr>
                        <th>服务名</th>
                        <th>实例数</th>
                        <th>健康实例</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="services-body">
                    <tr><td colspan="4" class="empty-state">加载中...</td></tr>
                </tbody>
            </table>
            <table id="configs-table" style="display:none">
                <thead>
                    <tr>
                        <th>Data ID</th>
                        <th>Group</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="configs-body">
                    <tr><td colspan="3" class="empty-state">加载中...</td></tr>
                </tbody>
            </table>
            <table id="instances-table" style="display:none">
                <thead>
                    <tr>
                        <th>服务</th>
                        <th>IP:Port</th>
                        <th>权重</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="instances-body">
                    <tr><td colspan="4" class="empty-state">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshAll()" title="刷新">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>

    <script>
        const tabs = document.querySelectorAll('.tab');
        const tables = { services: document.getElementById('services-table'), configs: document.getElementById('configs-table'), instances: document.getElementById('instances-table') };

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                Object.values(tables).forEach(t => t.style.display = 'none');
                tables[tab.dataset.tab].style.display = 'table';
            });
        });

        async function loadServices() {
            try {
                const res = await fetch('/admin/nacos/services');
                const data = await res.json();
                const tbody = document.getElementById('services-body');
                if (data.data && data.data.length > 0) {
                    tbody.innerHTML = data.data.map(s => `
                        <tr>
                            <td>${s.name}</td>
                            <td>${s.instance_count}</td>
                            <td>${s.instance_count}</td>
                            <td><span class="tag tag-healthy">健康</span></td>
                        </tr>
                    `).join('');
                    document.getElementById('service-count').textContent = data.data.length;
                    document.getElementById('healthy-count').textContent = data.data.length;
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无服务</td></tr>';
                    document.getElementById('service-count').textContent = '0';
                }
            } catch (e) {
                document.getElementById('services-body').innerHTML = '<tr><td colspan="4" class="empty-state">加载失败</td></tr>';
            }
        }

        async function loadConfigs() {
            try {
                const res = await fetch('/admin/nacos/configs');
                const data = await res.json();
                const tbody = document.getElementById('configs-body');
                if (data.data && data.data.length > 0) {
                    tbody.innerHTML = data.data.map(c => `
                        <tr>
                            <td>${c.data_id}</td>
                            <td>${c.group}</td>
                            <td><button class="btn btn-primary" onclick="viewConfig('${c.data_id}', '${c.group}')">查看</button></td>
                        </tr>
                    `).join('');
                    document.getElementById('config-count').textContent = data.data.length;
                } else {
                    tbody.innerHTML = '<tr><td colspan="3" class="empty-state">暂无配置</td></tr>';
                    document.getElementById('config-count').textContent = '0';
                }
            } catch (e) {
                document.getElementById('configs-body').innerHTML = '<tr><td colspan="3" class="empty-state">加载失败</td></tr>';
            }
        }

        async function loadInstances() {
            try {
                const res = await fetch('/admin/nacos/instances');
                const data = await res.json();
                const tbody = document.getElementById('instances-body');
                if (data.data && data.data.length > 0) {
                    tbody.innerHTML = data.data.map(i => `
                        <tr>
                            <td>${i.service}</td>
                            <td>${i.ip}:${i.port}</td>
                            <td>1.0</td>
                            <td><span class="tag ${i.healthy ? 'tag-healthy' : 'tag-unhealthy'}">${i.healthy ? '健康' : '异常'}</span></td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无实例</td></tr>';
                }
            } catch (e) {
                document.getElementById('instances-body').innerHTML = '<tr><td colspan="4" class="empty-state">加载失败</td></tr>';
            }
        }

        function viewConfig(dataId, group) {
            alert('配置内容: ' + dataId + ' @ ' + group);
        }

        function refreshAll() {
            loadServices();
            loadConfigs();
            loadInstances();
        }

        refreshAll();
        setInterval(refreshAll, 30000);
    </script>
</body>
</html>
