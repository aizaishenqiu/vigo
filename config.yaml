#     reads:
#       - host: 192.168.2.20
#         port: 3306
#         user: user_reader
#         pass: user-read-pass
#         charset: utf8mb4
#
#   # 订单数据库
#   order_db:
#     driver: mysql
#     host: 192.168.3.10
#     port: 3306
#     name: order_db
#     user: order_admin
#     pass: order-pass
#     charset: utf8mb4
#     max_open_conns: 800
#     max_idle_conns: 200
#     conn_max_lifetime: 1800
#     conn_max_idletime: 300
#     rw_split: true
#     writes:
#       - host: 192.168.3.11
#         port: 3306
#         user: order_writer
#         pass: order-write-pass
#         charset: utf8mb4
#     reads:
#       - host: 192.168.3.20
#         port: 3306
#         user: order_reader
