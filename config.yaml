# ==============================================
# Vigo 框架配置文件
# 支持环境变量占位符格式: ${ENV_VAR} 或 ${ENV_VAR:default_value}
# ==============================================

# ==============================================
# 应用基础配置
# ==============================================
app:
  # 应用名称
  name: vago
  # 应用版本号
  version: 1.0.1
  # HTTP 服务监听端口
  port: 8080
  # 是否开启调试模式（生产环境建议关闭）
  debug: false
  # 运行模式：dev | test | prod
  mode: prod
  # 是否显示控制台输出
  console: true
  # 启动时是否自动杀掉占用端口的进程
  auto_kill_port: true

# ==============================================
# 安全防护配置
# ==============================================
security:
  # 是否启用全局安全中间件（强烈建议启用）
  # 启用后会自动拦截 SQL 注入、XSS、命令注入等攻击
  enable_security_middleware: true
  
  # 是否启用 CSRF 保护
  enable_csrf_protection: false
  
  # 是否启用速率限制
  enable_rate_limit: false
  # 速率限制：每秒请求数
  rate_limit: 100
  
  # 是否启用 CORS 域名验证（生产环境必须启用）
  # 开发环境自动禁用 CORS 限制
  # Electron 桌面应用会自动放行（file://, app://, localhost）
  enable_cors_domain_check: true
  
  # 允许的域名列表（生产环境）
  # 开发环境自动允许所有域名
  # Electron 桌面应用无需配置，自动放行
  allowed_domains:
    - "https://www.example.com"
    - "https://api.example.com"
    - "https://admin.example.com"
  
  # IP 白名单（可选，为空则不限制）
  ip_whitelist: []
  
  # IP 黑名单
  ip_blacklist: []

# ==============================================
# 支付配置（支付宝、微信支付）
# ==============================================
payment:
  # 支付宝配置
  alipay:
    # 是否启用
    enabled: false
    # 应用 ID
    app_id: ""
    # 应用私钥
    app_private_key: ""
    # 支付宝公钥
    alipay_public_key: ""
    # 回调地址
    notify_url: ""
    # 返回地址
    return_url: ""
    # 服务商模式（true=服务商，false=个体）
    is_provider: false
    # 服务商 PID（服务商模式必填）
    provider_pid: ""
  
  # 微信支付配置
  wechat_pay:
    # 是否启用
    enabled: false
    # 商户号
    mch_id: ""
    # API 密钥
    api_key: ""
    # 应用 ID
    app_id: ""
    # 回调地址
    notify_url: ""
    # 服务商模式（true=服务商，false=个体）
    is_provider: false
    # 服务商商户号（服务商模式必填）
    provider_mch_id: ""

# ==============================================
# 第三方登录配置
# ==============================================
oauth:
  # QQ 登录配置
  qq:
    # 是否启用
    enabled: false
    # App ID
    app_id: ""
    # App Key
    app_key: ""
    # 回调地址
    redirect_uri: ""
  
  # 微信登录配置
  wechat:
    # 是否启用
    enabled: false
    # App ID
    app_id: ""
    # App Secret
    app_secret: ""
    # 回调地址
    redirect_uri: ""
  
  # 支付宝登录配置
  alipay:
    # 是否启用
    enabled: false
    # App ID
    app_id: ""
    # 应用私钥
    app_private_key: ""
    # 支付宝公钥
    alipay_public_key: ""
    # 回调地址
    redirect_uri: ""

# ==============================================
# 数据库配置（主库 - 默认数据库）
# 必须通过环境变量配置: DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME
# ==============================================
database:
  # 数据库驱动类型: mysql | postgres | sqlite | mssql
  driver: mysql
  # 主库主机地址（写库）
  host: ${DB_HOST}
  # 主库端口
  port: ${DB_PORT:3306}
  # 数据库名称
  name: ${DB_NAME}
  # 数据库用户名
  user: ${DB_USER}
  # 数据库密码
  pass: ${DB_PASSWORD}
  # 数据库字符集
  charset: utf8mb4

  # ==============================================
  # 连接池配置（10万并发优化）
  # ==============================================
  # 最大打开连接数（单机推荐: 1000，分布式推荐: 300-500）
  max_open_conns: 1000
  # 最大空闲连接数（建议为 max_open_conns 的 50%）
  max_idle_conns: 500
  # 连接最大生命周期（秒），建议 1800-3600
  conn_max_lifetime: 1800
  # 空闲连接回收时间（秒），超过该时间的空闲连接会被关闭
  conn_max_idletime: 300

  # ==============================================
  # 读写分离配置（分布式部署必须启用）
  # ==============================================
  # 是否开启读写分离
  rw_split: false

  # ==============================================
  # 多主库配置（写入负载均衡）
  # 配置多个主库时，写入操作会轮询分配到各主库
  # ==============================================
  writes: []
  # 示例配置:
  # writes:
  #   - host: 192.168.1.10
  #     port: 3306
  #     user: writer1
  #     pass: write-pass-1
  #     charset: utf8mb4
  #   - host: 192.168.1.11
  #     port: 3306
  #     user: writer2
  #     pass: write-pass-2
  #     charset: utf8mb4

  # ==============================================
  # 只读从库配置（读取负载均衡）
  # 配置多个从库时，读取操作会轮询分配到各从库
  # ==============================================
  reads: []
  # 示例配置:
  # reads:
  #   - host: 192.168.1.20
  #     port: 3306
  #     user: reader1
  #     pass: read-pass-1
  #     charset: utf8mb4
  #   - host: 192.168.1.21
  #     port: 3306
  #     user: reader2
  #     pass: read-pass-2
  #     charset: utf8mb4
  #   - host: 192.168.1.22
  #     port: 3306
  #     user: reader3
  #     pass: read-pass-3
  #     charset: utf8mb4

# ==============================================
# 多数据库配置（不同业务独立数据库）
# 每个业务库都可以独立配置读写分离
# ==============================================
databases: {}
# 示例配置:
# databases:
#   # 用户中心数据库
#   user_center:
#     driver: mysql
#     host: 192.168.2.10
#     port: 3306
#     name: user_center
