# ==============================================
# Nacos 配置中心 & 服务发现
# ==============================================
nacos:
  # Nacos 服务地址
  host: 127.0.0.1
  # Nacos 服务端口
  port: 8848
  # Nacos 命名空间 ID（留空使用 public）
  namespace: ""
  # 配置数据 ID
  data_id: vigo-config
  # 配置分组
  group: DEFAULT_GROUP
  # Nacos 安装路径（用于自动启动 Nacos 服务）
  install_path: ${NACOS_INSTALL_PATH:}

  # ==============================================
  # 服务发现配置
  # ==============================================
  discovery:
    # 是否启用服务发现
    enabled: false
    # 注册到 Nacos 的服务名称
    service_name: vigo-service
    # 是否自动注册服务
    auto_register: true
    # 心跳间隔（秒）
    heartbeat: 5

  # ==============================================
  # 管理界面配置
  # ==============================================
  admin:
    # 是否启用管理界面（启用后启动时显示访问地址和密码）
    enabled: false
    # 管理界面用户名（不设置则留空，需通过环境变量或手动配置）
    username: nacos
    # 管理界面密码（不设置则留空，需通过环境变量或手动配置）
    password: nacos
    # 管理界面端口
    port: 8848

# ==============================================
# Benchmark 压力测试配置
# ==============================================
benchmark:
  # 内存限制百分比（超过该限制会停止压测）
  mem_limit_percent: 95
  # CPU 限制百分比（超过该限制会停止压测）
  # 注意：压测工具本身会消耗大量 CPU，建议设置为 95 或更高
  cpu_limit_percent: 95

# ==============================================
# RabbitMQ 消息队列配置
# ==============================================
rabbitmq:
  # 是否启用 RabbitMQ（10 万并发场景强烈建议启用）
  enabled: false
  # RabbitMQ 主机地址
  host: 127.0.0.1
  # RabbitMQ 端口
  port: 5672
  # RabbitMQ 用户名
  user: guest
  # RabbitMQ 密码
  pass: guest
  # 虚拟主机
  vhost: /
  # 连接超时时间（秒）
  conn_timeout: 5
  # 心跳间隔（秒）
  heartbeat: 10
  # 重连延迟（秒）
  reconnect_delay: 3
  # 最大重连次数
  max_retries: 3

  # ==============================================
  # 管理界面配置
  # ==============================================
  admin:
    # 是否启用管理界面
    enabled: false
    # 管理界面用户名（不设置则留空，需通过环境变量或手动配置）
    username: guest
    # 管理界面密码（不设置则留空，需通过环境变量或手动配置）
    password: guest
    # 管理界面端口
    port: 15672

# ==============================================
# Redis 缓存配置（高并发优化版）
# ==============================================
redis:
  # Redis 主机地址（单实例模式）
  host: 127.0.0.1
  # Redis 端口
  port: 6379
  # Redis 密码
  password: "123456"
  # Redis 数据库编号（0-15）
  db: 0

  # ==============================================
  # 连接池配置（10 万并发优化）
  # ==============================================
  # 最大连接池大小（单机推荐：2000，分布式推荐：1000）
  pool_size: 2000
  # 最小空闲连接数（保持一定数量的空闲连接以提高响应速度）
  min_idle_conns: 200
  # 最大空闲连接数（超过该数量的空闲连接会被回收）
  max_idle_conns: 1000

  # ==============================================
  # Redis 集群配置（分布式部署启用）
  # ==============================================
  cluster:
    # 是否启用集群模式
    enabled: false
    # 集群节点地址列表
    addrs: []
    # 示例配置:
    # - "redis-1:6379"
    # - "redis-2:6379"
    # - "redis-3:6379"
    # - "redis-4:6379"
    # - "redis-5:6379"
    # - "redis-6:6379"

# ==============================================
# gRPC 微服务配置
# ==============================================
grpc:
  # 是否启用 gRPC 服务
  enabled: false
  # gRPC 服务端口
  port: 9090
  # 服务名称
  service_name: vigo
  # 是否启用 panic 恢复
  enable_recovery: true
  # 是否启用日志
  enable_logger: true
  # 最大接收消息大小（MB）
  max_recv_msg_size: 4
  # 最大发送消息大小（MB）
  max_send_msg_size: 4

# ==============================================
