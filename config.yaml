#     reads:
#       - host: 192.168.2.20
#         port: 3306
#         user: user_reader
#         pass: user-read-pass
#         charset: utf8mb4
#
#   # 订单数据库
#   order_db:
#     driver: mysql
#     host: 192.168.3.10
#     port: 3306
#     name: order_db
#     user: order_admin
#     pass: order-pass
#     charset: utf8mb4
#     max_open_conns: 800
